<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M INC. Delivery Run</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Prevent pull-to-refresh on mobile */
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #444;
        }

        canvas {
            display: block;
            background-color: #333;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-text {
            text-shadow: 2px 2px 0 #000;
            font-size: 16px;
            line-height: 1.5;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: auto;
            z-index: 10;
        }

        h1 {
            color: #ff3333;
            text-shadow: 4px 4px 0 #8b0000;
            font-size: 32px;
            margin-bottom: 20px;
            line-height: 1.2;
            /* Flexbox on H1 to align the box and the text "INC." vertically */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box {
            color: #ff3333; 
            background: white; 
            
            /* Force perfect centering of the text inside the box */
            display: inline-flex;
            justify-content: center;
            align-items: center;
            
            /* Optical centering: Adjusted to shift text Left by ~5px */
            /* Previous: 2px 12px 6px 16px */
            padding: 2px 17px 6px 11px; /* Top, Right, Bottom, Left */
            
            margin-right: 15px; /* Space between logo and INC */
            
            font-family: Arial, sans-serif;
            font-weight: 900;
            letter-spacing: -3px; /* Tighten the Mi */
            font-size: 32px; /* Ensure it matches the header size */
            line-height: 1;
            
            border-radius: 4px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5); /* Add a shadow to match the retro vibe */
        }

        p {
            color: #ddd;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
            max-width: 80%;
        }

        .btn {
            background: #ff3333;
            color: white;
            border: 4px solid #fff;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
            text-transform: uppercase;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:hover {
            background: #ff5555;
        }

        /* Scanline effect for that retro feel */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }
        
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            width: 100%;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: none;
        }

        @media (hover: none) and (pointer: coarse) {
            #mobile-controls {
                display: flex;
            }
            .touch-hint {
                color: rgba(255,255,255,0.5);
                font-size: 40px;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="scanlines"></div>
        
        <div id="ui-layer">
            <div class="hud-text">
                SCORE: <span id="score">0</span><br>
                ORDER: <span id="delivery-status">0%</span>
            </div>
        </div>

        <div id="start-screen">
            <h1><span class="logo-box">Mi</span>INC.</h1>
            <h2>DELIVERY RUN</h2>
            <p>Drive the Mi INC. truck.<br>Dodge safety hazards.<br>Deliver the crates!</p>
            <p style="font-size: 10px; color: #aaa;">Controls: Arrows / A-D / Touch Sides</p>
            <button class="btn" onclick="startGame()">START ENGINE</button>
        </div>

        <div id="game-over-screen" style="display: none;">
            <h1>CRASHED!</h1>
            <p>The shipment was lost.</p>
            <p>Final Score: <span id="final-score">0</span></p>
            <p id="countdown-text" style="font-size: 10px; color: #aaa; margin-top: 0;">Menu in 5...</p>
            <button class="btn" onclick="resetGame()">TRY AGAIN</button>
        </div>
        
        <div id="mobile-controls">
            <div class="touch-hint">←</div>
            <div class="touch-hint">→</div>
        </div>
    </div>

    <script>
        // --- Game Config ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Fixed internal resolution for that pixel-art look, scaled up by CSS
        const GAME_WIDTH = 400;
        const GAME_HEIGHT = 600;
        
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // Auto-resize for responsiveness
        function resize() {
            const scale = Math.min(window.innerWidth / GAME_WIDTH, window.innerHeight / GAME_HEIGHT);
            const w = GAME_WIDTH * scale;
            const h = GAME_HEIGHT * scale;
            const container = document.getElementById('game-container');
            container.style.width = `${w}px`;
            container.style.height = `${h}px`;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Game State ---
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let speed = 0;
        let baseSpeed = 5;
        let deliveryProgress = 0;
        let deliveryGoal = 2000; // Distance units
        let level = 1;
        let countdownTimer = null;

        // --- Input Handling ---
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            a: false,
            d: false
        };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // Touch handling
        canvas.addEventListener('touchstart', handleTouch, {passive: false});
        canvas.addEventListener('touchend', endTouch, {passive: false});
        
        function handleTouch(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            
            // Simple logic: touch left half = left, right half = right
            if (touchX < rect.width / 2) {
                keys.ArrowLeft = true;
                keys.ArrowRight = false;
            } else {
                keys.ArrowRight = true;
                keys.ArrowLeft = false;
            }
        }

        function endTouch(e) {
            e.preventDefault();
            keys.ArrowLeft = false;
            keys.ArrowRight = false;
        }

        // --- Classes ---

        class Truck {
            constructor() {
                this.width = 50;
                this.height = 90;
                this.x = GAME_WIDTH / 2 - this.width / 2;
                this.y = GAME_HEIGHT - 150;
                this.velX = 0;
                this.speed = 7;
                this.tilt = 0;
            }

            update() {
                if (keys.ArrowLeft || keys.a) {
                    this.velX = -this.speed;
                    this.tilt = -0.1;
                } else if (keys.ArrowRight || keys.d) {
                    this.velX = this.speed;
                    this.tilt = 0.1;
                } else {
                    this.velX = 0;
                    this.tilt = 0;
                }

                this.x += this.velX;

                // Boundaries
                // Road width is approx 300 (50 to 350)
                if (this.x < 40) this.x = 40;
                if (this.x > GAME_WIDTH - 40 - this.width) this.x = GAME_WIDTH - 40 - this.width;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                ctx.rotate(this.tilt);
                ctx.translate(-(this.x + this.width/2), -(this.y + this.height/2));

                const x = this.x;
                const y = this.y;
                const w = this.width;
                const h = this.height;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(x + 5, y + 5, w, h);

                // 1. Truck Bed (Wood)
                ctx.fillStyle = '#D4A373'; // Light wood
                ctx.fillRect(x, y + 30, w, h - 30);
                
                // Wood Slats detail
                ctx.fillStyle = '#C68E5D';
                ctx.fillRect(x + 5, y + 35, w - 10, 10);
                ctx.fillRect(x + 5, y + 50, w - 10, 10);
                ctx.fillRect(x + 5, y + 65, w - 10, 10);
                ctx.fillRect(x + 5, y + 80, w - 10, 5);

                // 2. Cargo (Crates)
                ctx.fillStyle = '#A67C52'; // Darker wood for crates
                // Crate 1
                ctx.fillRect(x + 5, y + 35, 18, 18);
                ctx.strokeStyle = '#6F4E37';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 5, y + 35, 18, 18);
                // Crate 1 "X" brace
                ctx.beginPath();
                ctx.moveTo(x+5, y+35); ctx.lineTo(x+23, y+53);
                ctx.moveTo(x+23, y+35); ctx.lineTo(x+5, y+53);
                ctx.stroke();

                // Crate 2
                ctx.fillRect(x + 27, y + 45, 18, 18);
                ctx.strokeRect(x + 27, y + 45, 18, 18);
                // Crate 2 "X" brace
                ctx.beginPath();
                ctx.moveTo(x+27, y+45); ctx.lineTo(x+45, y+63);
                ctx.moveTo(x+45, y+45); ctx.lineTo(x+27, y+63);
                ctx.stroke();


                // 3. Cab (Red) - Drawn after bed so it overlaps slightly for perspective
                ctx.fillStyle = '#D62828'; // M INC. Red
                ctx.fillRect(x, y, w, 35);

                // Roof depth/bevel
                ctx.fillStyle = '#B01F1F';
                ctx.fillRect(x, y+30, w, 5);

                // Windshield
                ctx.fillStyle = '#457B9D'; // Dark blue-ish glass
                ctx.fillRect(x + 5, y + 5, w - 10, 10);
                // Glare on windshield
                ctx.fillStyle = '#A8DADC'; 
                ctx.beginPath();
                ctx.moveTo(x+5, y+5); ctx.lineTo(x+10, y+5); ctx.lineTo(x+5, y+10);
                ctx.fill();

                // 4. "Mi" Logo on Roof
                ctx.fillStyle = '#FFFFFF';
                // Using standard font for "Mi" to ensure better kerning/alignment than manual drawing
                ctx.font = '900 16px Arial, sans-serif'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Mi', x + w/2, y + 25);
                
                // 5. Wheels (sticking out)
                ctx.fillStyle = '#111';
                // Front Left
                ctx.fillRect(x - 3, y + 8, 3, 12);
                // Front Right
                ctx.fillRect(x + w, y + 8, 3, 12);
                // Back Left
                ctx.fillRect(x - 3, y + 60, 3, 12);
                // Back Right
                ctx.fillRect(x + w, y + 60, 3, 12);

                ctx.restore();
            }

            getBounds() {
                return {
                    x: this.x + 5, // Hitbox slightly smaller than sprite
                    y: this.y + 5,
                    w: this.width - 10,
                    h: this.height - 10
                };
            }
        }

        class Obstacle {
            constructor() {
                this.width = 40;
                this.height = 40;
                // Random position on road (road is roughly x=50 to x=350)
                this.x = 50 + Math.random() * (GAME_WIDTH - 100 - this.width);
                this.y = -100;
                this.type = Math.random() > 0.5 ? 'cone' : 'barrier';
                this.markedForDeletion = false;
            }

            update(gameSpeed) {
                this.y += gameSpeed;
                if (this.y > GAME_HEIGHT) {
                    this.markedForDeletion = true;
                    score += 10;
                }
            }

            draw() {
                const x = this.x;
                const y = this.y;

                if (this.type === 'cone') {
                    // Traffic Cone
                    ctx.save();
                    
                    // 1. Define the Cone Shape
                    ctx.beginPath();
                    ctx.moveTo(x + 20, y);       // Top Center
                    ctx.lineTo(x + 35, y + 35);  // Bottom Right
                    ctx.lineTo(x + 5, y + 35);   // Bottom Left
                    ctx.closePath();

                    // 2. Fill Orange Base
                    ctx.fillStyle = '#F77F00';
                    ctx.fill();

                    // 3. Clip! (Anything drawn after this only appears inside the cone)
                    ctx.clip();

                    // 4. Draw White Stripes (as rectangles, they will be cut by clip)
                    ctx.fillStyle = 'white';
                    ctx.fillRect(x, y + 10, 40, 6);
                    ctx.fillRect(x, y + 22, 40, 6);

                    ctx.restore(); // Removes clip

                    // Base Plate (drawn outside clip)
                    ctx.fillStyle = '#D66D00';
                    ctx.fillRect(x, y + 35, 40, 5);

                } else {
                    // Construction Barrier
                    ctx.fillStyle = '#EAE2B7'; // Cream/Yellow
                    ctx.fillRect(x, y + 10, 60, 20);
                    
                    // Stripes
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.moveTo(x + 10, y + 10); ctx.lineTo(x + 20, y + 10); ctx.lineTo(x + 10, y + 30); ctx.lineTo(x, y + 30);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(x + 30, y + 10); ctx.lineTo(x + 40, y + 10); ctx.lineTo(x + 30, y + 30); ctx.lineTo(x + 20, y + 30);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(x + 50, y + 10); ctx.lineTo(x + 60, y + 10); ctx.lineTo(x + 50, y + 30); ctx.lineTo(x + 40, y + 30);
                    ctx.fill();

                    // Legs
                    ctx.fillStyle = '#555';
                    ctx.fillRect(x + 5, y + 30, 5, 10);
                    ctx.fillRect(x + 50, y + 30, 5, 10);

                    // Update width for hit detection since barrier is wider
                    this.width = 60; 
                }
            }

            getBounds() {
                return { x: this.x + 5, y: this.y + 10, w: this.width - 10, h: 20 };
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedY = Math.random() * 2 + 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.color = color;
                this.life = 1.0;
            }
            update() {
                this.y += this.speedY; // Move down with road
                this.x += this.speedX;
                this.life -= 0.05;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        // --- Game Variables ---
        let truck = new Truck();
        let obstacles = [];
        let particles = [];
        let roadOffset = 0;
        let frameCount = 0;
        let animationId;

        function spawnObstacle() {
            // Difficulty curve: spawn faster as score increases
            let spawnRate = 60; // Frames
            if (score > 500) spawnRate = 45;
            if (score > 1000) spawnRate = 30;

            if (frameCount % spawnRate === 0) {
                obstacles.push(new Obstacle());
            }
        }

        function checkCollisions() {
            const player = truck.getBounds();
            
            for (let obs of obstacles) {
                const enemy = obs.getBounds();
                
                if (
                    player.x < enemy.x + enemy.w &&
                    player.x + player.w > enemy.x &&
                    player.y < enemy.y + enemy.h &&
                    player.y + player.h > enemy.y
                ) {
                    gameOver();
                }
            }
        }

        function drawRoad() {
            // Grass
            ctx.fillStyle = '#386641'; // Green
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Road Body
            ctx.fillStyle = '#6C757D'; // Asphalt Grey
            ctx.fillRect(40, 0, GAME_WIDTH - 80, GAME_HEIGHT);

            // Road Edge Lines (White)
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(45, 0, 5, GAME_HEIGHT);
            ctx.fillRect(GAME_WIDTH - 50, 0, 5, GAME_HEIGHT);

            // Center Dashed Line (Yellow)
            ctx.fillStyle = '#F2E8CF';
            ctx.save();
            // Move dashed lines down
            let dashHeight = 40;
            let gap = 40;
            let totalDash = dashHeight + gap;
            
            for (let i = -1; i < (GAME_HEIGHT / totalDash) + 1; i++) {
                ctx.fillRect(GAME_WIDTH / 2 - 5, (i * totalDash) + (roadOffset % totalDash), 10, dashHeight);
            }
            ctx.restore();
        }

        function drawHUD() {
            document.getElementById('score').innerText = Math.floor(score);
            
            let pct = Math.min(100, Math.floor((deliveryProgress / deliveryGoal) * 100));
            document.getElementById('delivery-status').innerText = pct + "%";
            
            if (pct >= 100) {
                // Delivery Complete Visual
                ctx.fillStyle = 'rgba(0, 255, 0, 0.2)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 4;
                ctx.font = '30px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.strokeText("DELIVERED!", GAME_WIDTH/2, GAME_HEIGHT/2 - 50);
                ctx.fillText("DELIVERED!", GAME_WIDTH/2, GAME_HEIGHT/2 - 50);
                
                ctx.font = '15px "Press Start 2P"';
                ctx.fillText("SPEED UP!", GAME_WIDTH/2, GAME_HEIGHT/2 - 10);
            }
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update Game Logic
            speed = baseSpeed + (score / 500); // Speed increases with score
            roadOffset += speed;
            deliveryProgress += speed / 10;
            frameCount++;

            // Check Delivery Level Up
            if (deliveryProgress >= deliveryGoal) {
                score += 500;
                deliveryProgress = 0;
                deliveryGoal *= 1.2; // Harder next time
                baseSpeed += 1;
                // Flash effect handled in drawHUD
            }

            // Draw World
            drawRoad();

            // Obstacles
            spawnObstacle();
            obstacles.forEach(obs => obs.update(speed));
            obstacles = obstacles.filter(obs => !obs.markedForDeletion);
            obstacles.forEach(obs => obs.draw());

            // Player
            truck.update();
            truck.draw();

            // Particles (Dust from wheels)
            if (frameCount % 10 === 0) {
                particles.push(new Particle(truck.x + 5, truck.y + truck.height, '#999'));
                particles.push(new Particle(truck.x + truck.width - 5, truck.y + truck.height, '#999'));
            }
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => p.draw());

            // Collisions
            checkCollisions();

            // UI
            drawHUD();

            animationId = requestAnimationFrame(gameLoop);
        }

        // --- Global Functions ---

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            resetGameState();
            gameState = 'PLAYING';
            gameLoop();
        }

        function resetGame() {
            // Clear any pending timeout just in case
            if (countdownTimer) clearInterval(countdownTimer);
            document.getElementById('game-over-screen').style.display = 'none';
            startGame();
        }

        function goToMenu() {
            if (countdownTimer) clearInterval(countdownTimer);
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        }

        function resetGameState() {
            score = 0;
            baseSpeed = 6;
            deliveryProgress = 0;
            deliveryGoal = 2000;
            obstacles = [];
            particles = [];
            truck = new Truck();
            frameCount = 0;
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            cancelAnimationFrame(animationId);
            document.getElementById('final-score').innerText = Math.floor(score);
            document.getElementById('game-over-screen').style.display = 'flex';

            // Countdown Logic
            let secondsLeft = 5;
            const textEl = document.getElementById('countdown-text');
            textEl.innerText = `Menu in ${secondsLeft}...`;

            if (countdownTimer) clearInterval(countdownTimer);
            
            countdownTimer = setInterval(() => {
                secondsLeft--;
                if (secondsLeft <= 0) {
                    clearInterval(countdownTimer);
                    goToMenu();
                } else {
                    textEl.innerText = `Menu in ${secondsLeft}...`;
                }
            }, 1000);
        }

    </script>
</body>
</html>
