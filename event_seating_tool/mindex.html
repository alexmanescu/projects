<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Seating Chart Tool</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- html2canvas & jsPDF for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
            #root { height: auto; overflow: visible; }
        }

        .drag-over { background-color: #e0f2fe !important; border-color: #3b82f6 !important; transform: scale(1.05); }
        .guest-card { cursor: grab; transition: all 0.15s ease; touch-action: none; }
        .guest-card:active { cursor: grabbing; transform: scale(1.02); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .seat-enter { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .toast-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .cursor-move-table { cursor: grab; }
        .cursor-move-table:active { cursor: grabbing; }
        .cursor-rotate { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>') 10 10, auto; }
        .cursor-pan { cursor: grab; }
        .cursor-pan:active { cursor: grabbing; }
        
        .no-spinner::-webkit-inner-spin-button, 
        .no-spinner::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* Responsive Sidebar Transition */
        .sidebar-transition {
            transition: width 0.3s ease-in-out, opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden select-none touch-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Icons ---
        const Icons = {
            Upload: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Download: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Users: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            User: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            GripVertical: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>,
            Search: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            RefreshCw: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
            Utensils: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>,
            Info: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
            Pencil: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
            Check: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            X: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            AlertCircle: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Image: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
            PlusCircle: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            Trash2: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            RotateCw: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>,
            SortAsc: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5h10"/><path d="M11 9h7"/><path d="M11 13h4"/><path d="M3 17l3 3 3-3"/><path d="M6 18V4"/></svg>,
            SortDesc: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5h10"/><path d="M11 9h7"/><path d="M11 13h4"/><path d="M3 17l3 3 3-3"/><path d="M6 18V4" transform="scale(1, -1) translate(0, -22)"/></svg>,
            FloppyDisk: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            MousePointer: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>,
            Hand: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>,
            Plus: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Minus: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>,
            ChevronDown: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
            ChevronRight: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            RefreshCcw: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v6h6"/><path d="M21 12A9 9 0 0 0 6 5.3L3 8"/><path d="M21 22v-6h-6"/><path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/></svg>,
            Trash: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            List: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Menu: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>,
            Close: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        };

        const Icon = ({ name, size = 16, className }) => {
            const SvgIcon = Icons[name];
            if (!SvgIcon) return null;
            return <SvgIcon width={size} height={size} className={className} />;
        };

        // --- Helpers ---
        const getMealStyle = (meal) => {
            if (!meal) return { bg: 'bg-slate-100', text: 'text-slate-600', border: 'border-slate-300' };
            const m = meal.toLowerCase();
            if (m.includes('beef') || m.includes('ribs') || m.includes('steak') || m.includes('meat')) return { bg: 'bg-red-100', text: 'text-red-800', border: 'border-red-400' };
            if (m.includes('salmon') || m.includes('fish') || m.includes('seafood')) return { bg: 'bg-blue-100', text: 'text-blue-800', border: 'border-blue-400' };
            if (m.includes('vegetarian') || m.includes('vegan') || m.includes('eggplant')) return { bg: 'bg-green-100', text: 'text-green-800', border: 'border-green-400' };
            if (m.includes('child') || m.includes('kid')) return { bg: 'bg-yellow-100', text: 'text-yellow-800', border: 'border-yellow-400' };
            return { bg: 'bg-slate-200', text: 'text-slate-600', border: 'border-slate-300' };
        };

        const getMealLabel = (meal) => {
            if (!meal) return 'Not Selected';
            const m = meal.toLowerCase();
            if (m.includes('beef') || m.includes('ribs')) return '🥩 Beef';
            if (m.includes('salmon') || m.includes('fish')) return '🐟 Fish';
            if (m.includes('vegetarian') || m.includes('vegan')) return '🥗 Veg';
            if (m.includes('child')) return '🧸 Child';
            return '🍽️ Other';
        }

        const getInitials = (name) => {
            if (!name) return "?";
            const parts = name.split(" ");
            if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
            return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        };

        // --- Sub-Components ---

        const TableCapacityControls = ({ capacity, onUpdate }) => (
            <div className="flex items-center gap-1 bg-white/90 rounded border border-slate-300 shadow-sm pointer-events-auto" onMouseDown={e => e.stopPropagation()} onTouchStart={e => e.stopPropagation()}>
                <button 
                    onClick={(e) => { e.stopPropagation(); onUpdate(Math.max(1, capacity - 1)); }}
                    onTouchEnd={(e) => { e.stopPropagation(); onUpdate(Math.max(1, capacity - 1)); }}
                    className="w-6 h-6 flex items-center justify-center hover:bg-slate-100 text-slate-600 border-r border-slate-200"
                >
                    -
                </button>
                <span className="text-xs font-mono w-6 text-center">{capacity}</span>
                <button 
                    onClick={(e) => { e.stopPropagation(); onUpdate(Math.min(60, capacity + 1)); }}
                    onTouchEnd={(e) => { e.stopPropagation(); onUpdate(Math.min(60, capacity + 1)); }}
                    className="w-6 h-6 flex items-center justify-center hover:bg-slate-100 text-slate-600 border-l border-slate-200"
                >
                    +
                </button>
            </div>
        );

        const RoundTable = ({ table, guests, handleDragOver, handleDropTable, handleDropSeat, handleDragStart, setSelectedGuest, onTableMouseDown, isSelected, size, updateTableCapacity, onTouchStart }) => {
            const tableGuests = guests.filter(g => g.tableId === table.id);
            const seatRadius = (size / 2) - 38;

            return (
                <div 
                    data-drop-target="table"
                    data-table-id={table.id}
                    onDragOver={handleDragOver}
                    onDrop={(e) => handleDropTable(e, table.id)}
                    onMouseDown={(e) => onTableMouseDown(e, table.id, table.x, table.y)}
                    onTouchStart={(e) => onTableMouseDown(e, table.id, table.x, table.y, true)}
                    className={`absolute flex items-center justify-center transition-shadow duration-300 group cursor-move-table ${isSelected ? 'z-40' : 'z-10'}`}
                    style={{ width: `${size}px`, height: `${size}px`, left: table.x, top: table.y, touchAction: 'none' }}
                >
                    <div className={`absolute inset-[30px] rounded-full border-4 shadow-sm flex items-center justify-center z-0 transition-colors flex-col gap-1
                        ${isSelected ? 'ring-2 ring-blue-500 border-blue-400 bg-blue-50' : ''}
                        ${tableGuests.length >= table.capacity ? 'bg-slate-100 border-red-200' : 'bg-white/90 backdrop-blur-sm border-slate-300 group-hover:border-blue-300'}
                    `}>
                        <div className="text-center p-1 pointer-events-none select-none">
                            <div className="font-bold text-slate-700 text-lg leading-tight">{table.name}</div>
                            <div className="text-xs text-slate-400">{tableGuests.length} / {table.capacity}</div>
                        </div>
                        <TableCapacityControls capacity={table.capacity} onUpdate={(val) => updateTableCapacity(table.id, val)} />
                    </div>

                    {Array.from({ length: table.capacity }).map((_, i) => {
                        const guest = tableGuests.find(g => g.seatIndex === i);
                        const angle = (i / table.capacity) * 2 * Math.PI - (Math.PI / 2);
                        const x = Math.cos(angle) * seatRadius;
                        const y = Math.sin(angle) * seatRadius;
                        
                        const mealStyle = guest ? getMealStyle(guest.meal) : { bg: 'bg-slate-50', text: 'text-slate-300', border: 'border-slate-200 dashed' };

                        return (
                            <div
                                key={i}
                                data-drop-target="seat"
                                data-table-id={table.id}
                                data-seat-index={i}
                                onDragOver={handleDragOver}
                                onDrop={(e) => handleDropSeat(e, table.id, i)}
                                className={`absolute w-10 h-10 rounded-full flex items-center justify-center text-xs font-bold border-2 shadow-sm z-10 transition-all 
                                    ${guest ? 'cursor-grab hover:scale-110 hover:z-20' : 'hover:border-blue-400'}
                                    ${mealStyle.bg} ${mealStyle.text} ${mealStyle.border}
                                `}
                                style={{ transform: `translate(${x}px, ${y}px)` }}
                                draggable={!!guest}
                                onDragStart={(e) => { if(guest) { e.stopPropagation(); handleDragStart(e, guest.id); }}}
                                onTouchStart={(e) => { if(guest) { e.stopPropagation(); onTouchStart(e, guest.id); } else { e.stopPropagation(); /* Empty seat touch */ } }}
                                onMouseDown={(e) => e.stopPropagation()} 
                                onClick={(e) => { e.stopPropagation(); if (guest) setSelectedGuest(guest); }}
                                title={guest ? `${guest.name} (${getMealLabel(guest.meal)})` : `Seat ${i+1} (Empty)`}
                            >
                                {guest ? <span className="seat-enter">{getInitials(guest.name)}</span> : <span className="opacity-50">{i + 1}</span>}
                            </div>
                        );
                    })}
                </div>
            );
        };

        const RectTable = ({ table, guests, handleDragOver, handleDropTable, handleDropSeat, handleDragStart, setSelectedGuest, onTableMouseDown, isSelected, onResizeStart, updateTableCapacity, onRotateStart, onTouchStart }) => {
            const tableGuests = guests.filter(g => g.tableId === table.id);
            const [isEditingCap, setIsEditingCap] = useState(false);
            const [editCapValue, setEditCapValue] = useState(table.capacity);

            const seatDims = useMemo(() => {
                const w = table.width || 400;
                const h = table.height || 220;
                const availableArea = (w - 48) * (h - 50); 
                const areaPerSeat = availableArea / table.capacity;
                const side = Math.sqrt(1.25 * areaPerSeat) - 6; 
                const finalW = Math.min(40, Math.max(20, side));
                const finalH = finalW * 0.8;
                return { width: `${finalW}px`, height: `${finalH}px`, fontSize: `${Math.max(8, finalW / 3.5)}px` };
            }, [table.width, table.height, table.capacity]);

            const handleCapSubmit = () => {
                setIsEditingCap(false);
                let val = parseInt(editCapValue, 10);
                if (isNaN(val) || val < 1) val = 10;
                if (val > 60) val = 60; 
                updateTableCapacity(table.id, val);
            };

            const rotation = table.rotation || 0;

            const RotateHandle = ({ positionClass }) => (
                <div 
                    className={`absolute w-6 h-6 bg-white border border-slate-300 rounded-full shadow-sm flex items-center justify-center opacity-0 group-hover:opacity-100 hover:bg-blue-50 hover:border-blue-400 transition-opacity cursor-rotate z-50 ${positionClass}`}
                    onMouseDown={(e) => { e.stopPropagation(); e.preventDefault(); onRotateStart(e, table.id); }}
                    onTouchStart={(e) => { e.stopPropagation(); e.preventDefault(); onRotateStart(e, table.id, true); }}
                >
                    <Icon name="RotateCw" size={12} className="text-slate-500" />
                </div>
            );

            return (
                <div 
                    data-drop-target="table"
                    data-table-id={table.id}
                    onDragOver={handleDragOver}
                    onDrop={(e) => handleDropTable(e, table.id)}
                    onMouseDown={(e) => onTableMouseDown(e, table.id, table.x, table.y)}
                    onTouchStart={(e) => onTableMouseDown(e, table.id, table.x, table.y, true)}
                    className={`absolute bg-white/90 backdrop-blur-sm rounded-lg border-2 shadow-sm transition-colors flex flex-col items-center p-6 cursor-move-table group
                        ${isSelected ? 'ring-2 ring-blue-500 border-blue-400 z-40 bg-blue-50' : 'border-slate-300 hover:border-blue-300 z-10'}
                    `}
                    style={{ left: table.x, top: table.y, width: `${table.width || 400}px`, height: `${table.height || 220}px`, transform: `rotate(${rotation}deg)`, touchAction: 'none' }}
                >
                    <RotateHandle positionClass="-top-3 -left-3" />
                    <RotateHandle positionClass="-top-3 -right-3" />
                    <RotateHandle positionClass="-bottom-3 -left-3" />
                    <RotateHandle positionClass="-bottom-3 -right-3" />

                    <div className="absolute -top-4 bg-slate-800 text-white px-2 py-1 rounded-full text-xs font-bold shadow-md pointer-events-auto select-none flex items-center gap-2" onMouseDown={e => e.stopPropagation()} onTouchStart={e => e.stopPropagation()}>
                        <span>{table.name} ({tableGuests.length}/{table.capacity})</span>
                        <div className="flex items-center gap-1 bg-slate-700 rounded ml-1 border border-slate-600">
                             <button 
                                onClick={(e) => { e.stopPropagation(); updateTableCapacity(table.id, Math.max(1, table.capacity - 1)); }}
                                onTouchEnd={(e) => { e.stopPropagation(); updateTableCapacity(table.id, Math.max(1, table.capacity - 1)); }}
                                className="w-4 h-4 flex items-center justify-center hover:bg-slate-600 text-slate-300"
                            >-</button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); updateTableCapacity(table.id, Math.min(60, table.capacity + 1)); }}
                                onTouchEnd={(e) => { e.stopPropagation(); updateTableCapacity(table.id, Math.min(60, table.capacity + 1)); }}
                                className="w-4 h-4 flex items-center justify-center hover:bg-slate-600 text-slate-300"
                            >+</button>
                        </div>
                    </div>
                    
                    <div className="flex flex-wrap justify-center gap-1 mt-4 w-full h-full content-start overflow-hidden pointer-events-none">
                        {Array.from({ length: table.capacity }).map((_, i) => {
                            const guest = tableGuests.find(g => g.seatIndex === i);
                            const mealStyle = guest ? getMealStyle(guest.meal) : { bg: 'bg-slate-50', text: 'text-slate-300', border: 'border-slate-200 dashed' };
                            return (
                                <div 
                                    key={i}
                                    data-drop-target="seat"
                                    data-table-id={table.id}
                                    data-seat-index={i}
                                    onDragOver={handleDragOver}
                                    onDrop={(e) => handleDropSeat(e, table.id, i)}
                                    draggable={!!guest}
                                    onDragStart={(e) => { if (guest) { e.stopPropagation(); handleDragStart(e, guest.id); }}}
                                    onMouseDown={(e) => e.stopPropagation()} 
                                    onTouchStart={(e) => { if(guest) { e.stopPropagation(); onTouchStart(e, guest.id); } else { e.stopPropagation(); } }}
                                    onClick={(e) => { e.stopPropagation(); if (guest) setSelectedGuest(guest); }}
                                    className={`rounded-full font-semibold border flex items-center justify-center transition-all cursor-pointer relative pointer-events-auto
                                        ${mealStyle.bg} ${mealStyle.text} ${mealStyle.border}
                                        ${!guest ? 'hover:border-blue-400' : 'hover:scale-105 shadow-sm'}
                                    `}
                                    style={{ width: seatDims.width, height: seatDims.height, fontSize: seatDims.fontSize, transform: `rotate(-${rotation}deg)` }}
                                    title={guest ? guest.meal : "Empty Slot"}
                                >
                                    {guest ? <span className="truncate max-w-[90%] px-0.5">{getInitials(guest.name)}</span> : <span className="opacity-30">{i + 1}</span>}
                                </div>
                            )
                        })}
                    </div>

                    <div 
                        className="absolute bottom-1 right-1 cursor-nwse-resize p-1 text-slate-400 hover:text-blue-600 pointer-events-auto"
                        onMouseDown={(e) => { e.stopPropagation(); e.preventDefault(); onResizeStart(e, table.id); }}
                        onTouchStart={(e) => { e.stopPropagation(); e.preventDefault(); onResizeStart(e, table.id, true); }}
                    >
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="rotate-45"><path d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"/></svg>
                    </div>
                </div>
            );
        };

        const TableWrapper = (props) => {
            if (!props.table) return null;
            if (props.table.type === 'rect') return <RectTable {...props} />;
            return <RoundTable {...props} />;
        };

        const UnseatedList = ({ guests, searchQuery, setSearchQuery, handleDragStart, handleDragOver, handleDropSidebar, setSelectedGuest, handleFileUpload, updateGuestStatus, deleteGuestPermanently, addGuest, onTouchStart, isSidebarOpen, setIsSidebarOpen }) => {
            const [isDragOverFile, setIsDragOverFile] = useState(false);
            const [sortOrder, setSortOrder] = useState('asc'); 
            const [isRemovedExpanded, setIsRemovedExpanded] = useState(false);

            // Filter lists based on status and search query
            const activeGuests = useMemo(() => {
                return guests.filter(g => g.status !== 'removed' && !g.tableId && g.name.toLowerCase().includes(searchQuery.toLowerCase()))
                    .sort((a, b) => sortOrder === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
            }, [guests, searchQuery, sortOrder]);

            const removedGuests = useMemo(() => {
                return guests.filter(g => g.status === 'removed' && g.name.toLowerCase().includes(searchQuery.toLowerCase()))
                    .sort((a, b) => a.name.localeCompare(b.name));
            }, [guests, searchQuery]);

            const handleFileDragOver = (e) => { if (e.dataTransfer.types && Array.from(e.dataTransfer.types).includes("Files")) { e.preventDefault(); e.stopPropagation(); setIsDragOverFile(true); } };
            const handleFileDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); if (e.currentTarget.contains(e.relatedTarget)) return; setIsDragOverFile(false); };
            const handleFileDrop = (e) => { e.preventDefault(); e.stopPropagation(); if (e.dataTransfer.files && e.dataTransfer.files.length > 0) { setIsDragOverFile(false); handleFileUpload({ target: { files: e.dataTransfer.files } }); } else { setIsDragOverFile(false); } };

            return (
                <div 
                    className={`bg-white border-r border-slate-200 flex flex-col h-full shadow-lg z-30 flex-shrink-0 absolute md:relative transition-all duration-300 ${isSidebarOpen ? 'translate-x-0 w-80' : '-translate-x-full w-0 md:translate-x-0 md:w-80'}`}
                    onDragOver={handleDragOver} 
                    onDrop={handleDropSidebar}
                >
                     {/* Mobile Close Button */}
                    <button 
                        className="absolute -right-10 top-2 bg-white p-2 rounded-r shadow-md md:hidden"
                        onClick={() => setIsSidebarOpen(!isSidebarOpen)}
                    >
                        {isSidebarOpen ? <Icon name="Close" size={20} /> : <Icon name="Menu" size={20} />}
                    </button>

                    <div className="p-4 border-b border-slate-100 bg-slate-50 overflow-hidden">
                        <div className="flex items-center justify-between mb-3">
                            <h2 className="font-bold text-slate-700 flex items-center gap-2 truncate"><Icon name="Users" size={18} /> Guest List ({activeGuests.length})</h2>
                            <div className="flex gap-1">
                                <button onClick={addGuest} className="text-slate-400 hover:text-green-600 p-1 rounded hover:bg-slate-200 transition-colors" title="Add New Guest">
                                    <Icon name="Plus" size={16} />
                                </button>
                                <button onClick={() => setSortOrder(prev => prev === 'asc' ? 'desc' : 'asc')} className="text-slate-400 hover:text-blue-600 p-1 rounded hover:bg-slate-200 transition-colors" title={sortOrder === 'asc' ? "Sort Z-A" : "Sort A-Z"}>
                                    <Icon name={sortOrder === 'asc' ? "SortAsc" : "SortDesc"} size={16} />
                                </button>
                            </div>
                        </div>
                        <div className="relative">
                            <span className="absolute left-3 top-2.5 text-slate-400"><Icon name="Search" size={14} /></span>
                            <input type="text" placeholder="Find guest..." className="w-full pl-9 pr-3 py-2 text-sm border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-2 custom-scrollbar space-y-2 bg-slate-50 w-80">
                        {guests.length === 0 && <div className="text-center p-8 text-slate-400 text-sm"><p className="mb-2">No guests loaded.</p><p className="text-xs">Upload your CSV file to start.</p></div>}
                        
                        {activeGuests.map(guest => {
                            const mealStyle = getMealStyle(guest.meal);
                            return (
                                <div 
                                    key={guest.id} 
                                    draggable 
                                    onDragStart={(e) => handleDragStart(e, guest.id)} 
                                    onTouchStart={(e) => onTouchStart(e, guest.id)}
                                    onClick={() => setSelectedGuest(guest)} 
                                    className="guest-card bg-white p-2 rounded-md border border-slate-200 shadow-sm flex items-center gap-3 hover:border-blue-300 group select-none relative"
                                >
                                    <div className="text-slate-300 group-hover:text-blue-400 cursor-grab"><Icon name="GripVertical" size={14} /></div>
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border ${mealStyle.bg} ${mealStyle.text} ${mealStyle.border}`}>{getInitials(guest.name)}</div>
                                    <div className="flex-1 min-w-0"><div className="text-sm font-medium text-slate-700 truncate">{guest.name}</div><div className="text-[10px] text-slate-400 truncate">{getMealLabel(guest.meal)}</div></div>
                                    <button 
                                        className="opacity-0 group-hover:opacity-100 p-1 text-slate-400 hover:text-red-500 transition-opacity"
                                        onClick={(e) => { e.stopPropagation(); updateGuestStatus(guest.id, 'removed'); }}
                                        title="Remove Guest"
                                    >
                                        <Icon name="Trash" size={14} />
                                    </button>
                                </div>
                            );
                        })}
                    </div>

                    {/* Removed Guests Section */}
                    <div className="border-t border-slate-200 bg-slate-50 w-80">
                        <div 
                            className="px-4 py-3 flex items-center justify-between cursor-pointer hover:bg-slate-100"
                            onClick={() => setIsRemovedExpanded(!isRemovedExpanded)}
                        >
                            <span className="text-xs font-bold text-slate-600 uppercase flex items-center gap-2">
                                <Icon name="Trash2" size={14} /> Removed Guests ({removedGuests.length})
                            </span>
                            <Icon name={isRemovedExpanded ? "ChevronDown" : "ChevronRight"} size={14} className="text-slate-400" />
                        </div>
                        
                        {isRemovedExpanded && (
                            <div className="max-h-48 overflow-y-auto p-2 custom-scrollbar bg-slate-100 border-t border-slate-200 space-y-1">
                                {removedGuests.length === 0 && <div className="text-xs text-slate-400 text-center py-2">No removed guests</div>}
                                {removedGuests.map(guest => (
                                    <div key={guest.id} className="bg-white p-2 rounded border border-slate-200 flex items-center justify-between group">
                                        <span className="text-xs font-medium text-slate-500 truncate max-w-[120px]" title={guest.name}>{guest.name}</span>
                                        <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button 
                                                onClick={() => updateGuestStatus(guest.id, 'active')}
                                                className="p-1 hover:bg-blue-100 text-blue-600 rounded" 
                                                title="Restore"
                                            >
                                                <Icon name="RefreshCcw" size={12} />
                                            </button>
                                            <button 
                                                onClick={() => deleteGuestPermanently(guest.id)}
                                                className="p-1 hover:bg-red-100 text-red-600 rounded" 
                                                title="Delete Permanently"
                                            >
                                                <Icon name="X" size={12} />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className={`p-4 border-t border-slate-200 transition-colors duration-200 w-80 ${isDragOverFile ? 'bg-blue-100 border-blue-300' : 'bg-slate-50'}`} onDragOver={handleFileDragOver} onDragLeave={handleFileDragLeave} onDrop={handleFileDrop}>
                        <label className={`flex items-center justify-center gap-2 w-full text-white py-2 px-4 rounded-md cursor-pointer transition-all shadow-sm text-sm font-medium ${isDragOverFile ? 'bg-blue-500 scale-105' : 'bg-blue-600 hover:bg-blue-700'}`}>
                            <Icon name="Upload" size={16} /> {isDragOverFile ? "Drop CSV Here" : "Upload CSV"} <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                        </label>
                        <p className="text-[10px] text-slate-400 text-center mt-2">Supports "Cleaned" list</p>
                    </div>
                </div>
            );
        };

        const GuestDetails = ({ selectedGuest, setSelectedGuest, tables, updateGuestMeal, updateGuestName, moveGuest }) => {
            const [isEditingMeal, setIsEditingMeal] = useState(false);
            const [isEditingName, setIsEditingName] = useState(false);
            const [tempMeal, setTempMeal] = useState("");
            const [tempName, setTempName] = useState("");

            useEffect(() => {
                if (selectedGuest) {
                    setTempMeal(selectedGuest.meal || "");
                    setTempName(selectedGuest.name || "");
                    setIsEditingMeal(false);
                    setIsEditingName(false);
                }
            }, [selectedGuest]);

            if (!selectedGuest) return null;

            const mealStyle = getMealStyle(selectedGuest.meal);
            const handleSaveMeal = () => { updateGuestMeal(selectedGuest.id, tempMeal); setIsEditingMeal(false); };
            const handleSaveName = () => { updateGuestName(selectedGuest.id, tempName); setIsEditingName(false); };
            
            const mealOptions = ["Braised Beef Short Ribs", "Grilled Salmon", "Eggplant Rollantini (Vegetarian)", "Child Meal", "No Selection"];

            return (
                <div className="fixed inset-0 bg-black/20 z-[70] flex items-center justify-center backdrop-blur-sm" onClick={() => setSelectedGuest(null)}>
                    <div className="bg-white rounded-xl shadow-2xl p-6 w-80 transform transition-all scale-100" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-start mb-4"><h3 className="text-lg font-bold text-slate-800">Guest Details</h3><button onClick={() => setSelectedGuest(null)} className="text-slate-400 hover:text-slate-600">&times;</button></div>
                        <div className="flex items-center gap-4 mb-6">
                            <div className={`w-16 h-16 rounded-full flex items-center justify-center text-xl font-bold border-4 shrink-0 ${mealStyle.bg} ${mealStyle.text} ${mealStyle.border}`}>{getInitials(selectedGuest.name)}</div>
                            <div className="flex-1 min-w-0">
                                {isEditingName ? (
                                    <div className="flex gap-1 mb-1">
                                        <input type="text" value={tempName} onChange={(e) => setTempName(e.target.value)} className="w-full text-sm border border-slate-300 rounded px-1 py-0.5" />
                                        <button onClick={handleSaveName} className="text-green-600"><Icon name="Check" size={14} /></button>
                                    </div>
                                ) : (
                                    <div className="font-bold text-lg leading-tight flex items-center gap-2 group">
                                        {selectedGuest.name} 
                                        {/* Changed: Removed group-hover logic so pencil is always visible */}
                                        <button onClick={() => setIsEditingName(true)} className="text-blue-500 hover:text-blue-700 transition-opacity"><Icon name="Pencil" size={12} /></button>
                                    </div>
                                )}
                                <div className="text-sm text-slate-500">{selectedGuest.tableId ? `${tables.find(t => t.id === selectedGuest.tableId)?.name} - Seat ${selectedGuest.seatIndex + 1}` : "Not Seated"}</div>
                            </div>
                        </div>
                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                            <div className="text-xs text-slate-400 uppercase font-semibold mb-1 flex justify-between items-center">Meal Choice {!isEditingMeal && (<button onClick={() => setIsEditingMeal(true)} className="text-blue-500 hover:text-blue-700"><Icon name="Pencil" size={12} /></button>)}</div>
                            {isEditingMeal ? (
                                <div className="flex gap-2 mt-2">
                                    <select value={tempMeal} onChange={(e) => setTempMeal(e.target.value)} className="w-full text-sm border border-slate-300 rounded px-2 py-1"><option value="">Select Meal...</option>{mealOptions.map(opt => (<option key={opt} value={opt}>{opt}</option>))}</select>
                                    <button onClick={handleSaveMeal} className="text-green-600 hover:bg-green-100 p-1 rounded"><Icon name="Check" size={16} /></button><button onClick={() => setIsEditingMeal(false)} className="text-red-500 hover:bg-red-100 p-1 rounded"><Icon name="X" size={16} /></button>
                                </div>
                            ) : (
                                <div className="flex items-center gap-2"><Icon name="Utensils" size={16} className="text-slate-400" /><span className="font-medium text-slate-700">{selectedGuest.meal || "No selection"}</span></div>
                            )}
                        </div>
                        {selectedGuest.tableId && (<button onClick={() => { moveGuest(selectedGuest.id, null); setSelectedGuest(null); }} className="w-full mt-4 py-2 border border-red-200 text-red-600 rounded-md hover:bg-red-50 text-sm font-medium transition-colors">Unseat Guest</button>)}
                    </div>
                </div>
            )
        };

        const TableListModal = ({ isOpen, onClose, tables, guests, updateTableName }) => {
            if (!isOpen) return null;
            
            const [position, setPosition] = useState({ x: 20, y: 100 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [editingTableId, setEditingTableId] = useState(null);
            const [tempName, setTempName] = useState("");

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (isDragging) {
                        setPosition({
                            x: e.clientX - dragStart.x,
                            y: e.clientY - dragStart.y
                        });
                    }
                };
                
                const handleMouseUp = () => {
                    setIsDragging(false);
                };

                if (isDragging) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                }
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isDragging, dragStart]);

            const handleMouseDown = (e) => {
                setDragStart({
                    x: e.clientX - position.x,
                    y: e.clientY - position.y
                });
                setIsDragging(true);
            };
            const startEditing = (table) => { setEditingTableId(table.id); setTempName(table.name); };
            const saveTableName = (id) => { if (tempName.trim()) updateTableName(id, tempName); setEditingTableId(null); };
            const sortedTables = [...tables].sort((a, b) => { const numA = parseInt(a.name.replace(/\D/g,'')) || 0; const numB = parseInt(b.name.replace(/\D/g,'')) || 0; if(numA === 0 && numB === 0) return a.name.localeCompare(b.name); return numA - numB; });

            return (
                <div 
                    className="fixed bg-white rounded-xl shadow-2xl w-[90vw] md:w-[450px] flex flex-col z-[60] border border-slate-300"
                    style={{ left: window.innerWidth < 768 ? '5vw' : position.x, top: window.innerWidth < 768 ? '10vh' : position.y, maxHeight: '70vh' }}
                >
                     <div className="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-xl cursor-move select-none" onMouseDown={window.innerWidth >= 768 ? handleMouseDown : undefined}>
                        <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2"><Icon name="List" size={18}/> Seating Outline</h3><button onClick={onClose} className="text-slate-400 hover:text-slate-600">&times;</button>
                    </div>
                    <div className="overflow-y-auto p-4 space-y-4 custom-scrollbar flex-1">
                        {sortedTables.map(table => {
                            const tableGuests = guests.filter(g => g.tableId === table.id).sort((a, b) => (a.seatIndex || 0) - (b.seatIndex || 0));
                            return (
                                <div key={table.id} className="border border-slate-200 rounded-lg overflow-hidden">
                                    <div className="bg-slate-100 px-3 py-2 font-bold text-slate-700 flex justify-between items-center">
                                        <div className="flex items-center gap-2 flex-1">
                                            {editingTableId === table.id ? (
                                                <div className="flex items-center gap-1 w-full">
                                                    <input type="text" value={tempName} onChange={(e) => setTempName(e.target.value)} className="text-xs px-1 py-0.5 border border-blue-300 rounded w-full" autoFocus onKeyDown={(e) => e.key === 'Enter' && saveTableName(table.id)} />
                                                    <button onClick={() => saveTableName(table.id)} className="text-green-600"><Icon name="Check" size={14}/></button>
                                                </div>
                                            ) : (
                                                <><span>{table.name}</span><button onClick={() => startEditing(table)} className="text-slate-400 hover:text-blue-500"><Icon name="Pencil" size={12}/></button></>
                                            )}
                                        </div>
                                        <span className="text-xs font-normal text-slate-500 whitespace-nowrap ml-2">{tableGuests.length} / {table.capacity}</span>
                                    </div>
                                    <div className="p-3 bg-white">
                                        {tableGuests.length === 0 ? (
                                            <p className="text-xs text-slate-400 italic">No guests seated.</p>
                                        ) : (
                                            <ul className="space-y-1">
                                                {tableGuests.map((g, i) => (
                                                    <li key={g.id} className="text-xs flex justify-between items-center border-b border-slate-50 last:border-0 pb-1 last:pb-0">
                                                        <span className="font-medium text-slate-700">{i + 1}. {g.name}</span><span className="text-[10px] text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">{g.meal || '-'}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        )}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            )
        }

        const ProgressBar = ({ progress }) => (
            <div className="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center backdrop-blur-sm">
                <div className="bg-white p-6 rounded-xl shadow-2xl w-80">
                    <h3 className="text-lg font-bold text-slate-800 mb-2">Saving...</h3>
                    <div className="w-full bg-slate-200 rounded-full h-2.5 mb-2">
                        <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                    </div>
                    <p className="text-xs text-slate-500 text-right">{Math.round(progress)}%</p>
                </div>
            </div>
        );

        const SaveLoadModal = ({ isOpen, onClose, onSave, onLoad, currentName, setCurrentName }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-white rounded-xl shadow-2xl p-6 w-96" onClick={e => e.stopPropagation()}>
                        <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="FloppyDisk" size={24} /> Save / Load Layout</h3>
                        <p className="text-sm text-slate-500 mb-4">Enter a unique event name to save your progress or load a previous layout.</p>
                        <input type="text" placeholder="e.g. SmithWedding" className="w-full border border-slate-300 rounded-md px-3 py-2 mb-4 focus:ring-2 focus:ring-blue-500 outline-none" value={currentName} onChange={(e) => setCurrentName(e.target.value)} />
                        <div className="flex gap-3">
                            <button onClick={onSave} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md font-medium transition-colors flex items-center justify-center gap-2"><Icon name="FloppyDisk" size={16} /> Save</button>
                            <button onClick={onLoad} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-md font-medium transition-colors flex items-center justify-center gap-2"><Icon name="Download" size={16} /> Load</button>
                        </div>
                    </div>
                </div>
            );
        };

        const Toast = ({ message, onClose }) => {
            if (!message) return null;
            return (<div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-3 toast-enter"><Icon name="AlertCircle" size={20} className="text-yellow-400" /><span className="text-sm font-medium">{message}</span><button onClick={onClose} className="ml-2 text-slate-400 hover:text-white">&times;</button></div>);
        };

        const App = () => {
            const [roomName, setRoomName] = useState("Room Layout");
            const [isEditingName, setIsEditingName] = useState(false);
            const [guests, setGuests] = useState([]);
            const [draggedGuestId, setDraggedGuestId] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [isExporting, setIsExporting] = useState(false);
            const [selectedGuest, setSelectedGuest] = useState(null); 
            const [notification, setNotification] = useState(null);
            const [bgImage, setBgImage] = useState(null);
            const [bgImageDims, setBgImageDims] = useState({ width: 2000, height: 1500 });
            const [isDragOverBg, setIsDragOverBg] = useState(false);

            // Settings
            const [roundTableSize, setRoundTableSize] = useState(256);
            const [bgScale, setBgScale] = useState(1);
            
            // Selection & Multi-Move & Resize & Rotate
            const [selectedTableIds, setSelectedTableIds] = useState(new Set());
            const [movingTable, setMovingTable] = useState(null);
            const [resizingTable, setResizingTable] = useState(null);
            const [rotatingTable, setRotatingTable] = useState(null);
            const [selectionBox, setSelectionBox] = useState(null);
            
            // Viewport State
            const [viewTransform, setViewTransform] = useState({ x: 0, y: 0, scale: 1 });
            const [toolMode, setToolMode] = useState('select'); 
            const [isPanning, setIsPanning] = useState(false);
            const [panStart, setPanStart] = useState({ x: 0, y: 0 });

            // Save/Load State
            const [isSaveModalOpen, setIsSaveModalOpen] = useState(false);
            const [isTableListOpen, setIsTableListOpen] = useState(false);
            const [planName, setPlanName] = useState("");
            const [bgFile, setBgFile] = useState(null);
            const [csvFile, setCsvFile] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [touchDragState, setTouchDragState] = useState(null);

            const [tables, setTables] = useState(() => {
                const initialTables = [];
                initialTables.push({ id: `table-banquet`, name: 'Kids / Banquet', type: 'rect', capacity: 24, guestIds: [], x: 400, y: 50, width: 400, height: 220, rotation: 0 });
                for (let i = 1; i <= 14; i++) {
                    const row = Math.floor((i-1) / 4);
                    const col = (i-1) % 4;
                    initialTables.push({ id: `table-${i}`, name: `Table ${i}`, type: 'round', capacity: 10, guestIds: [], x: 100 + (col * 300), y: 300 + (row * 300), rotation: 0 });
                }
                return initialTables;
            });

            // Auto-scale on load
            useEffect(() => {
                if (window.innerWidth < 1200) {
                    setIsSidebarOpen(false); // Close sidebar on mobile/tablet initially
                }
                // Try to fit content roughly into view
                // Default content width is roughly 1600px wide
                const availableWidth = window.innerWidth - (window.innerWidth >= 1200 ? 320 : 0);
                const targetContentWidth = 1600;
                let initialScale = availableWidth / targetContentWidth;
                initialScale = Math.min(1, Math.max(0.3, initialScale)); // Clamp between 0.3 and 1
                setViewTransform(prev => ({ ...prev, scale: initialScale }));
            }, []);

            // Touch Drag Handling
            const handleTouchStartGuest = (e, guestId) => {
                const touch = e.touches[0];
                setTouchDragState({ id: guestId, startX: touch.clientX, startY: touch.clientY, currentX: touch.clientX, currentY: touch.clientY });
            };

            const handleTouchMoveGuest = (e) => {
                if (touchDragState) {
                    e.preventDefault(); 
                    const touch = e.touches[0];
                    setTouchDragState(prev => ({ ...prev, currentX: touch.clientX, currentY: touch.clientY }));
                }
            };

            const handleTouchEndGuest = (e) => {
                if (touchDragState) {
                    const touch = e.changedTouches[0];
                    // Hide the drag preview temporarily to see what's underneath
                    const elements = document.elementsFromPoint(touch.clientX, touch.clientY);
                    const dropTarget = elements.find(el => el.getAttribute('data-drop-target'));
                    
                    if (dropTarget) {
                        const type = dropTarget.getAttribute('data-drop-target');
                        const tableId = dropTarget.getAttribute('data-table-id');
                        const seatIndex = dropTarget.getAttribute('data-seat-index');
                        
                        if (tableId) {
                            moveGuest(touchDragState.id, tableId, seatIndex !== null ? parseInt(seatIndex) : null);
                        }
                    } else {
                         // Check if dropped on sidebar (unseat)
                         // Check x coordinate < 320 (sidebar width) or elements contains sidebar
                         if (touch.clientX < 320 && isSidebarOpen) {
                             moveGuest(touchDragState.id, null, null);
                         }
                    }
                    setTouchDragState(null);
                }
            };


            const showNotification = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };

            const handleSaveLayout = () => {
                if (!planName.trim()) { showNotification("Please enter a plan name."); return; }
                setIsSaveModalOpen(false); setIsUploading(true); setUploadProgress(0);
                const formData = new FormData();
                formData.append('name', planName);
                const layoutData = { tables, guests, roomName, bgImage, bgImageDims, roundTableSize, bgScale, viewTransform };
                formData.append('layoutData', JSON.stringify(layoutData));
                if (bgFile) formData.append('bgFile', bgFile);
                if (csvFile) formData.append('csvFile', csvFile);
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'save_layout.php', true);
                xhr.upload.onprogress = (e) => { if (e.lengthComputable) { setUploadProgress((e.loaded / e.total) * 100); } };
                xhr.onload = () => { setIsUploading(false); if (xhr.status === 200) { try { const result = JSON.parse(xhr.responseText); if (result.success) showNotification("Layout saved successfully!"); else showNotification("Error saving: " + result.message); } catch (e) { showNotification("Invalid server response"); } } else { showNotification("Error connecting to server."); } };
                xhr.onerror = () => { setIsUploading(false); showNotification("Network error occurred."); };
                xhr.send(formData);
            };

            const handleLoadLayout = async () => {
                if (!planName.trim()) { showNotification("Please enter a plan name."); return; }
                try {
                    const response = await fetch(`load_layout.php?name=${encodeURIComponent(planName)}`);
                    const result = await response.json();
                    if (result.success && result.data) {
                        const d = result.data;
                        if(d.tables) setTables(d.tables);
                        if(d.guests) setGuests(d.guests);
                        if(d.roomName) setRoomName(d.roomName);
                        if(d.bgImage) setBgImage(d.bgImage);
                        if(d.bgImageDims) setBgImageDims(d.bgImageDims);
                        if(d.roundTableSize) setRoundTableSize(d.roundTableSize);
                        if(d.bgScale) setBgScale(d.bgScale);
                        // Optional: restore view transform
                        // if(d.viewTransform) setViewTransform(d.viewTransform); 
                        showNotification("Layout loaded!");
                        setIsSaveModalOpen(false);
                    } else { showNotification("Error loading: " + (result.message || "Unknown error")); }
                } catch (e) { showNotification("Error connecting to server."); console.error(e); }
            };

            const handleReset = () => { if(confirm("Are you sure you want to unseat all guests? This will clear all seating assignments.")) { setGuests(prev => prev.map(g => ({...g, tableId: null, seatIndex: null}))); showNotification("All guests unseated."); } };
            const addTable = (type) => { const id = `table-new-${Date.now()}`; const newTable = { id, name: type === 'round' ? 'New Table' : 'New Banquet', type, capacity: type === 'round' ? 10 : 20, guestIds: [], x: 100, y: 100, rotation: 0, ...(type === 'rect' ? { width: 400, height: 200 } : {}) }; setTables(prev => [...prev, newTable]); showNotification(`Added new ${type} table`); };
            const removeSelectedTables = () => { if (selectedTableIds.size === 0) return; setGuests(prevGuests => prevGuests.map(g => (g.tableId && selectedTableIds.has(g.tableId)) ? { ...g, tableId: null, seatIndex: null } : g)); setTables(prev => prev.filter(t => !selectedTableIds.has(t.id))); setSelectedTableIds(new Set()); showNotification("Tables removed"); };
            const handleFileUpload = (event) => { const file = event.target.files && event.target.files[0]; if (!file) return; setCsvFile(file); Papa.parse(file, { header: true, skipEmptyLines: true, complete: (results) => processCSVData(results.data) }); };
            const processCSVData = (data) => {
                let newGuests = []; let guestIdCounter = 1;
                const addGuest = (name, meal, group) => { newGuests.push({ id: `guest-${guestIdCounter++}`, name: name.trim(), meal: meal || '', originalGroup: group, tableId: null, seatIndex: null, status: 'active' }); };
                if (data.length > 0) {
                    if ('Guest Name' in data[0]) { data.forEach(row => { const name = row['Guest Name']; if (name && name.trim()) addGuest(name, row['Meal Choice'], 'Individual'); }); } 
                    else if ('Name' in data[0] || 'Guests Attending' in data[0]) { data.forEach(row => { const rawName = row['Name'] || ""; const count = parseInt(row['Guests Attending'] || "0", 10); if (!rawName || count === 0) return; let names = rawName.split(/(?: and | & |, )/i).map(n => n.trim()).filter(n => n.length > 0); if (names.length === count) names.forEach(name => addGuest(name, '', rawName)); else if (names.length < count) { names.forEach(name => addGuest(name, '', rawName)); for (let i = 0; i < count - names.length; i++) addGuest(`Guest of ${names[0]}`, '', rawName); } else { if (count === 1) addGuest(rawName, '', rawName); else for (let i = 0; i < count; i++) addGuest(names[i] || "Guest", '', rawName); } }); }
                }
                setGuests(newGuests);
            };
            const updateGuestMeal = (guestId, newMeal) => { setGuests(prevGuests => prevGuests.map(g => g.id === guestId ? { ...g, meal: newMeal } : g)); if (selectedGuest && selectedGuest.id === guestId) setSelectedGuest(prev => ({ ...prev, meal: newMeal })); };
            const updateGuestName = (guestId, newName) => { setGuests(prevGuests => prevGuests.map(g => g.id === guestId ? { ...g, name: newName } : g)); if (selectedGuest && selectedGuest.id === guestId) setSelectedGuest(prev => ({ ...prev, name: newName })); };
            const updateTableCapacity = (tableId, newCapacity) => { setTables(prev => prev.map(t => t.id === tableId ? { ...t, capacity: newCapacity } : t)); setGuests(prev => prev.map(g => { if (g.tableId === tableId && g.seatIndex >= newCapacity) { return { ...g, tableId: null, seatIndex: null }; } return g; })); };
            
            // New: Update Table Name
            const updateTableName = (tableId, newName) => { setTables(prev => prev.map(t => t.id === tableId ? { ...t, name: newName } : t)); };

            // New: Guest Management
            const updateGuestStatus = (guestId, status) => { setGuests(prev => prev.map(g => g.id === guestId ? { ...g, status, tableId: null, seatIndex: null } : g)); if (status === 'removed' && selectedGuest?.id === guestId) setSelectedGuest(null); };
            const deleteGuestPermanently = (guestId) => { setGuests(prev => prev.filter(g => g.id !== guestId)); };
            const addNewGuest = () => {
                const newId = `guest-manual-${Date.now()}`;
                const newGuest = { id: newId, name: "New Guest", meal: "", originalGroup: "Manual", tableId: null, seatIndex: null, status: 'active' };
                setGuests(prev => [...prev, newGuest]);
                setSelectedGuest(newGuest);
                showNotification("New guest added");
            };

            const handleDragStart = (e, guestId) => { setDraggedGuestId(guestId); e.dataTransfer.effectAllowed = "move"; e.stopPropagation(); };
            const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; };
            const handleDropTable = (e, targetTableId) => { e.preventDefault(); e.stopPropagation(); if (!draggedGuestId) return; moveGuest(draggedGuestId, targetTableId, null); setDraggedGuestId(null); };
            const handleDropSeat = (e, targetTableId, targetSeatIndex) => { e.preventDefault(); e.stopPropagation(); if (!draggedGuestId) return; moveGuest(draggedGuestId, targetTableId, targetSeatIndex); setDraggedGuestId(null); }
            const handleDropSidebar = (e) => { e.preventDefault(); if (!draggedGuestId) return; moveGuest(draggedGuestId, null, null); setDraggedGuestId(null); };
            const moveGuest = (guestId, targetTableId, targetSeatIndex = null) => {
                setGuests(prevGuests => {
                    const guest = prevGuests.find(g => g.id === guestId); if (!guest) return prevGuests;
                    if (!targetTableId) return prevGuests.map(g => g.id === guestId ? { ...g, tableId: null, seatIndex: null } : g);
                    const targetTable = tables.find(t => t.id === targetTableId); if (!targetTable) return prevGuests;
                    if (targetSeatIndex !== null) {
                        const occupant = prevGuests.find(g => g.tableId === targetTableId && g.seatIndex === targetSeatIndex && g.id !== guestId);
                        if (occupant) { return prevGuests.map(g => { if (g.id === guestId) return { ...g, tableId: targetTableId, seatIndex: targetSeatIndex }; if (g.id === occupant.id) { if (guest.tableId === targetTableId && guest.seatIndex !== null) return { ...g, seatIndex: guest.seatIndex }; return { ...g, tableId: guest.tableId, seatIndex: guest.seatIndex }; } return g; }); } 
                        else return prevGuests.map(g => g.id === guestId ? { ...g, tableId: targetTableId, seatIndex: targetSeatIndex } : g);
                    }
                    const occupiedSeats = prevGuests.filter(g => g.tableId === targetTableId && g.id !== guestId).map(g => g.seatIndex);
                    let newSeatIndex = 0; while (occupiedSeats.includes(newSeatIndex)) newSeatIndex++;
                    if (newSeatIndex >= targetTable.capacity) { showNotification("Table is full!"); return prevGuests; }
                    return prevGuests.map(g => g.id === guestId ? { ...g, tableId: targetTableId, seatIndex: newSeatIndex } : g);
                });
            };

            const handleTableMouseDown = (e, tableId, x, y, isTouch = false) => {
                if (!isTouch && e.button !== 0) return; 
                e.preventDefault(); e.stopPropagation();
                if (e.target.closest('.guest-seat')) return;
                
                // Selection logic (simplified for touch)
                if(!isTouch) {
                    const isCtrl = e.ctrlKey || e.metaKey;
                    const isSelected = selectedTableIds.has(tableId);
                    let newSelection = new Set(selectedTableIds);
                    if (isCtrl) { if (isSelected) newSelection.delete(tableId); else newSelection.add(tableId); } else { if (!isSelected) { newSelection = new Set([tableId]); } }
                    setSelectedTableIds(newSelection);
                } else {
                    // For touch, simple select logic or keep existing
                    if(!selectedTableIds.has(tableId)) setSelectedTableIds(new Set([tableId]));
                }

                const initialPositions = {};
                tables.forEach(t => { if (selectedTableIds.has(t.id) || t.id === tableId) { initialPositions[t.id] = { x: t.x, y: t.y }; } });
                
                const clientX = isTouch ? e.touches[0].clientX : e.clientX;
                const clientY = isTouch ? e.touches[0].clientY : e.clientY;

                setMovingTable({ id: tableId, startX: clientX, startY: clientY, initialPositions });
            };
            const handleResizeStart = (e, tableId, isTouch = false) => { e.preventDefault(); e.stopPropagation(); const table = tables.find(t => t.id === tableId); if (!table) return; const clientX = isTouch ? e.touches[0].clientX : e.clientX; const clientY = isTouch ? e.touches[0].clientY : e.clientY; setResizingTable({ id: tableId, startX: clientX, startY: clientY, startW: table.width || 400, startH: table.height || 220, rotation: table.rotation || 0 }); };
            const handleRotateStart = (e, tableId, isTouch = false) => { e.preventDefault(); e.stopPropagation(); const table = tables.find(t => t.id === tableId); if(!table) return; const w = table.width || 400; const h = table.height || 220; const cx = table.x + w/2; const cy = table.y + h/2; const clientX = isTouch ? e.touches[0].clientX : e.clientX; const clientY = isTouch ? e.touches[0].clientY : e.clientY; setRotatingTable({ id: tableId, cx, cy, startRotation: table.rotation || 0, startAngle: Math.atan2(clientY - cy, clientX - cx) * (180 / Math.PI) }); };
            
            const handleBgMouseDown = (e) => {
                if (e.button !== 0) return; e.preventDefault();
                if (toolMode === 'pan') { setIsPanning(true); setPanStart({ x: e.clientX - viewTransform.x, y: e.clientY - viewTransform.y }); return; }
                const container = document.getElementById('floorplan-inner'); const rect = container.getBoundingClientRect(); const x = (e.clientX - rect.left) / viewTransform.scale; const y = (e.clientY - rect.top) / viewTransform.scale;
                setSelectionBox({ startX: x, startY: y, currentX: x, currentY: y, isDragging: true });
            };
            const handleWheel = (e) => { e.preventDefault(); const zoomSensitivity = 0.001; const delta = -e.deltaY * zoomSensitivity; const newScale = Math.min(Math.max(0.1, viewTransform.scale + delta), 5); setViewTransform(prev => ({ ...prev, scale: newScale })); };
            const handleZoomIn = () => { setViewTransform(prev => ({ ...prev, scale: Math.min(prev.scale + 0.1, 5) })); };
            const handleZoomOut = () => { setViewTransform(prev => ({ ...prev, scale: Math.max(prev.scale - 0.1, 0.1) })); };

            useEffect(() => {
                const handleMouseMove = (e) => {
                    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                    
                    if(touchDragState) return; // Handled by separate listener

                    if (isPanning) {
                        e.preventDefault();
                        setViewTransform(prev => ({
                            ...prev,
                            x: clientX - panStart.x,
                            y: clientY - panStart.y
                        }));
                        return;
                    }

                    if (selectionBox && selectionBox.isDragging) {
                        e.preventDefault();
                        const container = document.getElementById('floorplan-inner'); 
                        const rect = container.getBoundingClientRect();
                        const x = (clientX - rect.left) / viewTransform.scale;
                        const y = (clientY - rect.top) / viewTransform.scale;
                        
                        setSelectionBox(prev => ({ ...prev, currentX: x, currentY: y }));
                        return;
                    }

                    if (rotatingTable) {
                        e.preventDefault(); const currentAngle = Math.atan2(clientY - rotatingTable.cy, clientX - rotatingTable.cx) * (180 / Math.PI); const diff = currentAngle - rotatingTable.startAngle;
                        setTables(prev => prev.map(t => t.id === rotatingTable.id ? { ...t, rotation: rotatingTable.startRotation + diff } : t)); return;
                    }
                    if (resizingTable) {
                        e.preventDefault();
                        // Adjust deltas by zoom scale
                        const dx = (clientX - resizingTable.startX) / viewTransform.scale;
                        const dy = (clientY - resizingTable.startY) / viewTransform.scale;
                        
                        const rad = (resizingTable.rotation * Math.PI) / 180; const cos = Math.cos(rad); const sin = Math.sin(rad);
                        const localDw = dx * cos + dy * sin;
                        const localDh = dy * cos - dx * sin;
                        setTables(prev => prev.map(t => t.id === resizingTable.id ? { ...t, width: Math.max(200, resizingTable.startW + localDw), height: Math.max(100, resizingTable.startH + localDh) } : t)); return;
                    }
                    if (movingTable) {
                        e.preventDefault(); 
                        // Adjust deltas by zoom scale
                        const dx = (clientX - movingTable.startX) / viewTransform.scale;
                        const dy = (clientY - movingTable.startY) / viewTransform.scale;
                        
                        setTables(prev => prev.map(t => { if (movingTable.initialPositions[t.id]) { return { ...t, x: movingTable.initialPositions[t.id].x + dx, y: movingTable.initialPositions[t.id].y + dy }; } return t; }));
                    }
                };
                const handleMouseUp = (e) => {
                    if (isPanning) setIsPanning(false);
                    if (selectionBox && selectionBox.isDragging) {
                        const minX = Math.min(selectionBox.startX, selectionBox.currentX); const maxX = Math.max(selectionBox.startX, selectionBox.currentX);
                        const minY = Math.min(selectionBox.startY, selectionBox.currentY); const maxY = Math.max(selectionBox.startY, selectionBox.currentY);
                        if (Math.abs(maxX - minX) < 5 && Math.abs(maxY - minY) < 5) { if (!e.shiftKey) setSelectedTableIds(new Set()); } 
                        else {
                            const newSelection = e.shiftKey ? new Set(selectedTableIds) : new Set();
                            tables.forEach(t => {
                                const w = t.width || (t.type === 'round' ? roundTableSize : 400); const h = t.height || (t.type === 'round' ? roundTableSize : 220);
                                // Simple check
                                if (minX < t.x + w && maxX > t.x && minY < t.y + h && maxY > t.y) newSelection.add(t.id);
                            });
                            setSelectedTableIds(newSelection);
                        }
                        setSelectionBox(null);
                    }
                    setMovingTable(null); setResizingTable(null); setRotatingTable(null);
                };
                window.addEventListener('mousemove', handleMouseMove); window.addEventListener('mouseup', handleMouseUp);
                window.addEventListener('touchmove', handleMouseMove, { passive: false }); window.addEventListener('touchend', handleMouseUp);
                return () => { 
                    window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp);
                    window.removeEventListener('touchmove', handleMouseMove); window.removeEventListener('touchend', handleMouseUp);
                };
            }, [movingTable, resizingTable, rotatingTable, selectionBox, tables, selectedTableIds, roundTableSize, viewTransform, isPanning, panStart, touchDragState]);
