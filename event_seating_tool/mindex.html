            const handleBgDragOver = (e) => { if (e.dataTransfer.types && Array.from(e.dataTransfer.types).includes("Files")) { e.preventDefault(); setIsDragOverBg(true); } };
            const handleBgDragLeave = (e) => { e.preventDefault(); setIsDragOverBg(false); };
            const handleBgDrop = (e) => {
                e.preventDefault(); setIsDragOverBg(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (file.type.startsWith('image/')) {
                        setBgFile(file); // Capture file for save
                        const reader = new FileReader(); reader.onload = (e) => { const img = new Image(); img.onload = () => { setBgImageDims({ width: img.width, height: img.height }); setBgImage(reader.result); showNotification("Background Updated"); }; img.src = reader.result; }; reader.readAsDataURL(file); 
                    }
                }
            };

            const handleExport = async () => {
                setIsExporting(true);
                setTimeout(async () => {
                    const element = document.getElementById('floorplan-area');
                    const canvas = await html2canvas(element, { scale: 2, backgroundColor: "#ffffff", useCORS: true, allowTaint: true, windowWidth: element.scrollWidth, windowHeight: element.scrollHeight, x: 0, y: 0, width: element.offsetWidth, height: element.offsetHeight, ignoreElements: (el) => el.classList.contains('select-box-overlay') });
                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('l', 'mm', 'letter'); 
                    
                    // --- Page 1: Floor Plan ---
                    const pdfWidth = pdf.internal.pageSize.getWidth(); const pdfHeight = pdf.internal.pageSize.getHeight();
                    const margin = 10; const headerHeight = 20; const availableWidth = pdfWidth - (margin * 2); const availableHeight = pdfHeight - headerHeight - margin;
                    const imgProps = pdf.getImageProperties(imgData); const imgRatio = imgProps.width / imgProps.height;
                    let finalWidth = availableWidth; let finalHeight = finalWidth / imgRatio;
                    if (finalHeight > availableHeight) { finalHeight = availableHeight; finalWidth = finalHeight * imgRatio; }
                    const x = margin + (availableWidth - finalWidth) / 2; const y = headerHeight + margin; 
                    pdf.setFontSize(24); pdf.text(roomName, 10, 15); pdf.setFontSize(10); pdf.text(`Generated: ${new Date().toLocaleDateString()}`, 10, 22);
                    pdf.addImage(imgData, 'PNG', x, y, finalWidth, finalHeight);

                    // --- Page 2+: Guest List Report ---
                    pdf.addPage();
                    pdf.setFontSize(18);
                    pdf.text("Guest List by Table", 10, 15);
                    let cursorY = 25;
                    const lineHeight = 7;
                    const pageHeight = pdf.internal.pageSize.getHeight();

                    // Sort tables naturally (Table 1, Table 2...)
                    const sortedTables = [...tables].sort((a, b) => {
                        const numA = parseInt(a.name.replace(/\D/g,'')) || 0;
                        const numB = parseInt(b.name.replace(/\D/g,'')) || 0;
                        if(numA === 0 && numB === 0) return a.name.localeCompare(b.name);
                        return numA - numB;
                    });

                    pdf.setFontSize(11);
                    sortedTables.forEach(table => {
                        const tableGuests = guests.filter(g => g.tableId === table.id).sort((a, b) => (a.seatIndex || 0) - (b.seatIndex || 0));
                        
                        // Check for page break space (header + 1 guest line approx)
                        if (cursorY > pageHeight - 20) { pdf.addPage(); cursorY = 20; }

                        pdf.setFont("helvetica", "bold");
                        pdf.text(`${table.name} (${tableGuests.length} Guests):`, 10, cursorY);
                        cursorY += lineHeight;
                        
                        pdf.setFont("helvetica", "normal");
                        
                        const guestTexts = tableGuests.map((g, i) => `${g.name}${g.meal ? ` (${g.meal})` : ''}`);
                        const textBlock = guestTexts.length > 0 ? guestTexts.join(', ') : "No guests seated.";
                        
                        const splitText = pdf.splitTextToSize(textBlock, pdfWidth - 20);
                        
                        if (cursorY + (splitText.length * 5) > pageHeight - 10) {
                             pdf.addPage(); cursorY = 20;
                             pdf.setFont("helvetica", "bold");
                             pdf.text(`${table.name} (Continued):`, 10, cursorY);
                             cursorY += lineHeight;
                             pdf.setFont("helvetica", "normal");
                        }

                        pdf.text(splitText, 10, cursorY);
                        cursorY += (splitText.length * 5) + 5; // Add extra spacing after each table
                    });

                    const fileName = roomName.toLowerCase().replace(/[^a-z0-9]/g, '-') + '.pdf';
                    pdf.save(fileName); setIsExporting(false);
                }, 100);
            };
            const handleBgClick = (e) => { if (e.target.id === 'floorplan-inner' && toolMode === 'select') { setSelectedTableIds(new Set()); } };

            return (
                <div className="flex h-screen w-full font-sans">
                    {/* Touch Drag Ghost Overlay */}
                    {touchDragState && (
                        <div 
                            className="fixed bg-white/90 p-2 rounded shadow-lg border border-blue-500 z-[100] pointer-events-none flex items-center gap-2 transform -translate-x-1/2 -translate-y-1/2"
                            style={{ left: touchDragState.currentX, top: touchDragState.currentY }}
                        >
                            <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border bg-blue-100 text-blue-800 border-blue-400">
                                <Icon name="User" size={14} />
                            </div>
                            <span className="text-xs font-bold text-slate-700">Moving Guest...</span>
                        </div>
                    )}

                    {isUploading && <ProgressBar progress={uploadProgress} />}
                    <SaveLoadModal isOpen={isSaveModalOpen} onClose={() => setIsSaveModalOpen(false)} onSave={handleSaveLayout} onLoad={handleLoadLayout} currentName={planName} setCurrentName={setPlanName} />
                    <TableListModal isOpen={isTableListOpen} onClose={() => setIsTableListOpen(false)} tables={tables} guests={guests} updateTableName={updateTableName} />
                    <GuestDetails selectedGuest={selectedGuest} setSelectedGuest={setSelectedGuest} tables={tables} updateGuestMeal={updateGuestMeal} updateGuestName={updateGuestName} moveGuest={moveGuest} />
                    <Toast message={notification} onClose={() => setNotification(null)} />
                    <UnseatedList 
                        guests={guests} 
                        searchQuery={searchQuery} 
                        setSearchQuery={setSearchQuery} 
                        handleDragStart={handleDragStart} 
                        handleDragOver={handleDragOver} 
                        handleDropSidebar={handleDropSidebar} 
                        setSelectedGuest={setSelectedGuest} 
                        handleFileUpload={handleFileUpload} 
                        updateGuestStatus={updateGuestStatus}
                        deleteGuestPermanently={deleteGuestPermanently}
                        addGuest={addNewGuest}
                        onTouchStart={handleTouchStartGuest}
                        isSidebarOpen={isSidebarOpen}
                        setIsSidebarOpen={setIsSidebarOpen}
                    />
                    
                    {/* Touch listener layer for guest drag movements across the screen */}
                    {touchDragState && (
                        <div className="fixed inset-0 z-[99] touch-none" onTouchMove={handleTouchMoveGuest} onTouchEnd={handleTouchEndGuest}></div>
                    )}

                    <div className="flex-1 flex flex-col bg-slate-100 min-w-0">
                        <header className="bg-white border-b border-slate-200 px-4 py-3 flex flex-col md:flex-row items-center justify-between shadow-sm z-10 shrink-0 gap-4">
                            {/* Top Row: Title & Mobile Toggle */}
                            <div className="flex items-center justify-between w-full md:w-auto">
                                <div className="flex items-center gap-2">
                                    {isEditingName ? (
                                        <input type="text" className="text-lg font-bold text-slate-800 border-b border-blue-500 focus:outline-none" value={roomName} onChange={(e) => setRoomName(e.target.value)} onBlur={() => setIsEditingName(false)} onKeyDown={(e) => e.key === 'Enter' && setIsEditingName(false)} autoFocus />
                                    ) : (<h1 className="text-lg font-bold text-slate-800 cursor-pointer hover:text-blue-600 flex items-center gap-2" onClick={() => setIsEditingName(true)} title="Click to rename">{roomName}<Icon name="Pencil" size={14} className="opacity-50" /></h1>)}
                                </div>
                                <div className="text-xs text-slate-500 ml-4 hidden md:block">Seated: {guests.filter(g => g.tableId).length} / {guests.length}</div>
                            </div>

                            {/* Desktop Controls Container (Flex Wrap) */}
                            <div className="hidden md:flex flex-1 items-center justify-end gap-4 overflow-x-auto">
                                
                                {/* Tools (Select/Pan/Zoom) */}
                                <div className="flex items-center gap-2 bg-slate-100 rounded-lg p-1">
                                     <button onClick={() => setToolMode('select')} className={`p-1.5 rounded-md transition-all ${toolMode === 'select' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`} title="Select Tool"><Icon name="MousePointer" size={16} /></button>
                                     <button onClick={() => setToolMode('pan')} className={`p-1.5 rounded-md transition-all ${toolMode === 'pan' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`} title="Hand Tool (Pan)"><Icon name="Hand" size={16} /></button>
                                     <div className="w-px h-6 bg-slate-300 mx-1"></div>
                                     <button onClick={handleZoomOut} className="p-1 hover:bg-white rounded text-slate-500 hover:text-slate-700 transition-colors" title="Zoom Out"><Icon name="Minus" size={14} /></button>
                                     <div className="text-xs font-mono text-slate-500 w-10 text-center select-none">{Math.round(viewTransform.scale * 100)}%</div>
                                     <button onClick={handleZoomIn} className="p-1 hover:bg-white rounded text-slate-500 hover:text-slate-700 transition-colors" title="Zoom In"><Icon name="Plus" size={14} /></button>
                                </div>

                                {/* Add Tables */}
                                <div className="flex items-center gap-2 border-l border-slate-200 pl-4">
                                     <button onClick={() => addTable('round')} className="flex items-center gap-1 text-sm text-slate-600 hover:text-blue-600 px-2 py-1 rounded hover:bg-slate-50"><Icon name="PlusCircle" size={16} /> Round</button>
                                     <button onClick={() => addTable('rect')} className="flex items-center gap-1 text-sm text-slate-600 hover:text-blue-600 px-2 py-1 rounded hover:bg-slate-50"><Icon name="PlusCircle" size={16} /> Rect</button>
                                     {selectedTableIds.size > 0 && (<button onClick={removeSelectedTables} className="flex items-center gap-1 text-sm text-red-600 hover:bg-red-50 px-2 py-1 rounded ml-2"><Icon name="Trash2" size={16} /> Delete</button>)}
                                </div>

                                 {/* Sliders (Restored) */}
                                <div className="flex items-center gap-4 border-l border-slate-200 pl-4">
                                    <div className="flex items-center gap-2"><span className="text-xs font-semibold text-slate-400">TABLE SIZE</span><input type="range" min="180" max="350" value={roundTableSize} onChange={(e) => setRoundTableSize(parseInt(e.target.value))} className="w-20 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer" /></div>
                                    <div className="flex items-center gap-2"><span className="text-xs font-semibold text-slate-400">FP SCALE</span><input type="range" min="0.5" max="3" step="0.1" value={bgScale} onChange={(e) => setBgScale(parseFloat(e.target.value))} className="w-20 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer" /></div>
                                </div>

                            </div>

                            {/* Action Buttons (Right) */}
                            <div className="flex items-center gap-2 w-full md:w-auto justify-end">
                                 <button onClick={() => setIsSaveModalOpen(true)} className="flex items-center gap-2 px-3 py-2 text-sm text-blue-600 border border-blue-600 hover:bg-blue-50 rounded-md transition-colors shadow-sm"><Icon name="FloppyDisk" size={14} /> Save / Load</button>
                                 <button onClick={() => setIsTableListOpen(true)} className="flex items-center gap-2 px-3 py-2 text-sm text-slate-600 hover:bg-slate-100 border border-slate-300 rounded-md transition-colors shadow-sm"><Icon name="List" size={14} /> List View</button>
                                 <button onClick={handleReset} className="flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-md transition-colors"><Icon name="RefreshCw" size={14} /> Reset All</button>
                                 <button onClick={handleExport} className="flex items-center gap-2 px-4 py-2 text-sm bg-slate-800 text-white hover:bg-slate-700 rounded-md shadow-sm transition-colors"><Icon name="Download" size={14} /> Export PDF</button>
                            </div>

                            {/* Mobile Toolbar (Separate row) */}
                            <div className="flex md:hidden w-full overflow-x-auto gap-2 pb-2">
                                <button onClick={() => setToolMode(toolMode === 'select' ? 'pan' : 'select')} className="p-2 bg-slate-200 rounded text-slate-700"><Icon name={toolMode === 'select' ? "MousePointer" : "Hand"} size={16} /></button>
                                <button onClick={handleZoomOut} className="p-2 bg-slate-100 rounded text-slate-600"><Icon name="Minus" size={16} /></button>
                                <button onClick={handleZoomIn} className="p-2 bg-slate-100 rounded text-slate-600"><Icon name="Plus" size={16} /></button>
                                <div className="w-px h-8 bg-slate-300 mx-1"></div>
                                <button onClick={() => addTable('round')} className="p-2 bg-slate-100 rounded text-blue-600"><Icon name="PlusCircle" size={16} /> R</button>
                                <button onClick={() => addTable('rect')} className="p-2 bg-slate-100 rounded text-blue-600"><Icon name="PlusCircle" size={16} /> S</button>
                                {selectedTableIds.size > 0 && <button onClick={removeSelectedTables} className="p-2 bg-red-100 text-red-600 rounded"><Icon name="Trash2" size={16} /></button>}
                            </div>
                        </header>
                        
                        <div className="flex-1 overflow-hidden relative bg-slate-200 cursor-default" id="floorplan-area" onDragOver={handleBgDragOver} onDragLeave={handleBgDragLeave} onDrop={handleBgDrop} onWheel={handleWheel}>
                            <div id="floorplan-inner" onMouseDown={handleBgMouseDown} onTouchStart={handleBgMouseDown} className={`relative transition-transform duration-75 ease-out origin-top-left ${toolMode === 'pan' ? (isPanning ? 'cursor-grabbing' : 'cursor-grab') : 'cursor-default'}`} style={{ width: bgImage ? `${bgImageDims.width * bgScale}px` : '3000px', height: bgImage ? `${bgImageDims.height * bgScale}px` : '3000px', transform: `translate(${viewTransform.x}px, ${viewTransform.y}px) scale(${viewTransform.scale})`, backgroundImage: bgImage ? `url(${bgImage})` : 'none', backgroundSize: '100% 100%', backgroundRepeat: 'no-repeat', backgroundColor: isDragOverBg ? '#e2e8f0' : (bgImage ? 'transparent' : '#f1f5f9') }}>
                                {!bgImage && (<div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none transform scale-100"><Icon name="Image" size={96} className="mb-4 opacity-20" /><p className="font-medium text-2xl opacity-40">Drag floor plan image here to set background</p></div>)}
                                {selectionBox && (<div className="absolute border-2 border-blue-500 bg-blue-200/30 z-50 pointer-events-none select-box-overlay" style={{ left: Math.min(selectionBox.startX, selectionBox.currentX), top: Math.min(selectionBox.startY, selectionBox.currentY), width: Math.abs(selectionBox.currentX - selectionBox.startX), height: Math.abs(selectionBox.currentY - selectionBox.startY) }} />)}
                                {tables.map(table => (<TableWrapper key={table.id} table={table} guests={guests} handleDragOver={handleDragOver} handleDropTable={handleDropTable} handleDropSeat={handleDropSeat} handleDragStart={handleDragStart} setSelectedGuest={setSelectedGuest} onTableMouseDown={handleTableMouseDown} isSelected={selectedTableIds.has(table.id)} size={roundTableSize} onResizeStart={handleResizeStart} onRotateStart={handleRotateStart} updateTableCapacity={updateTableCapacity} onTouchStart={handleTableMouseDown} />))}
                                {isDragOverBg && (<div className="absolute inset-0 bg-blue-500/10 border-4 border-blue-400 border-dashed z-50 pointer-events-none flex items-center justify-center"><div className="bg-blue-500 text-white px-6 py-3 rounded-full font-bold shadow-lg">Drop Image to Set Background</div></div>)}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
