                formData.append('name', nameToSave);
                formData.append('layoutData', JSON.stringify({ tables, guests, roomName, bgImage, bgImageDims, roundTableSize, bgScale, viewTransform }));
                if (bgFile) formData.append('bgFile', bgFile);
                if (csvFile) formData.append('csvFile', csvFile);
                
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'save_layout.php', true);
                xhr.upload.onprogress = (e) => { if (e.lengthComputable) setUploadProgress((e.loaded / e.total) * 100); };
                xhr.onload = () => { 
                    setIsUploading(false); 
                    if (xhr.status === 200) { 
                        try { 
                            const result = JSON.parse(xhr.responseText); 
                            if (result.success) {
                                showNotification("Layout saved successfully!"); 
                                refreshLayouts();
                            } else showNotification("Error saving: " + result.message); 
                        } catch (e) { showNotification("Invalid response from server."); } 
                    } else showNotification("Server error."); 
                };
                xhr.onerror = () => { setIsUploading(false); showNotification("Network error occurred."); };
                xhr.send(formData);
            };

            const handleLoadLayout = async (name) => {
                if (!name) return;
                try {
                    const res = await fetch(`load_layout.php?name=${encodeURIComponent(name)}`);
                    const result = await res.json();
                    if (result.success && result.data) {
                        const d = result.data;
                        if(d.tables) setTables(d.tables.map((t, i) => { if (t.number != null) return t; const parsed = parseInt(t.name.replace(/\D/g, '')); return { ...t, number: isNaN(parsed) ? i + 1 : parsed }; })); if(d.guests) setGuests(d.guests); if(d.roomName) setRoomName(d.roomName);
                        if(d.bgImage) setBgImage(d.bgImage); if(d.bgImageDims) setBgImageDims(d.bgImageDims);
                        if(d.roundTableSize) setRoundTableSize(d.roundTableSize); if(d.bgScale) setBgScale(d.bgScale);
                        setPlanName(name); // Set current loaded plan
                        setIsLoadModalOpen(false); showNotification("Layout Loaded!");
                    } else {
                        showNotification("Failed to load layout.");
                    }
                } catch(e) { showNotification("Connection error."); }
            };

            const exportSeatedCSV = () => {
                const seatedGuests = guests.filter(g => g.status !== 'removed');
                if (seatedGuests.length === 0) return showNotification("No guests available to export.");
                const csvRows = [["Guest Name", "Meal Choice", "Table Name", "Table #"].join(",")];
                seatedGuests.forEach(g => {
                    const table = tables.find(t => t.id === g.tableId);
                    const tableName = table ? table.name : "Unassigned";
                    const tableNum = table && table.number != null ? table.number : "";
                    const meal = g.meal || "No selection";
                    csvRows.push([`"${g.name.replace(/"/g, '""')}"`, `"${meal.replace(/"/g, '""')}"`, `"${tableName.replace(/"/g, '""')}"`, `"${tableNum}"`].join(","));
                });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' }));
                link.download = `${roomName.replace(/\s+/g, '_')}_Seating.csv`; link.click();
            };

            const handleExportPDF = async () => {
                setIsExporting(true);
                setTimeout(async () => {
                    const element = document.getElementById('floorplan-area');
                    const canvas = await html2canvas(element, { scale: 2, useCORS: true, windowWidth: element.scrollWidth, windowHeight: element.scrollHeight, width: element.offsetWidth, height: element.offsetHeight, ignoreElements: (el) => el.classList.contains('select-box-overlay') });
                    const pdf = new jspdf.jsPDF('l', 'mm', 'letter');
                    const w = pdf.internal.pageSize.getWidth(), h = pdf.internal.pageSize.getHeight();
                    const ratio = canvas.width / canvas.height;
                    let fw = w - 20, fh = fw / ratio;
                    if (fh > h - 35) { fh = h - 35; fw = fh * ratio; }
                    pdf.setFontSize(24); pdf.text(roomName, 10, 15); pdf.setFontSize(10); pdf.text(`Generated: ${new Date().toLocaleDateString()}`, 10, 22);
                    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', (w - fw) / 2, 30, fw, fh);
                    
                    // Report Page
                    pdf.addPage(); pdf.setFontSize(18); pdf.text("Guest Seating Report", 10, 15);
                    let cy = 25; const sorted = [...tables].sort((a,b) => (a.number ?? 999) - (b.number ?? 999));
                    sorted.forEach(t => {
                        const gs = guests.filter(x => x.tableId === t.id).sort((a,b) => (a.seatIndex||0)-(b.seatIndex||0));
                        if (cy > pdf.internal.pageSize.getHeight() - 20) { pdf.addPage(); cy = 20; }
                        const tableLabel = t.number != null ? `#${t.number} - ${t.name}` : t.name;
                        pdf.setFont("helvetica", "bold"); pdf.setFontSize(12); pdf.text(`${tableLabel}:`, 10, cy); cy += 6;
                        pdf.setFont("helvetica", "normal"); pdf.setFontSize(10);
                        const txt = gs.length ? gs.map(x => `${x.name} (${x.meal || 'No meal'})`).join(', ') : "No guests seated.";
                        const split = pdf.splitTextToSize(txt, w - 20); pdf.text(split, 10, cy); cy += (split.length * 5) + 5;
                    });
                    pdf.save(`${roomName.replace(/\s+/g, '_')}.pdf`); setIsExporting(false);
                }, 100);
            };

            const handleReset = () => { if(confirm("Are you sure you want to unseat all guests? This will clear all seating assignments.")) { setGuests(prev => prev.map(g => ({...g, tableId: null, seatIndex: null}))); showNotification("All guests unseated."); } };
            const addTable = (type) => { const id = `table-new-${Date.now()}`; const nextNum = tables.length > 0 ? Math.max(...tables.map(t => t.number ?? 0)) + 1 : 1; const newTable = { id, number: nextNum, name: type === 'round' ? 'New Table' : 'New Banquet', type, capacity: type === 'round' ? 10 : 20, guestIds: [], x: 100, y: 100, rotation: 0, ...(type === 'rect' ? { width: 400, height: 200 } : {}) }; setTables(prev => [...prev, newTable]); showNotification(`Added new ${type} table`); };
            const removeSelectedTables = () => { if (selectedTableIds.size === 0) return; setGuests(prev => prev.map(g => (g.tableId && selectedTableIds.has(g.tableId)) ? { ...g, tableId: null, seatIndex: null } : g)); setTables(prev => prev.filter(t => !selectedTableIds.has(t.id))); setSelectedTableIds(new Set()); showNotification("Tables removed"); };
            const updateTableName = (id, name) => setTables(prev => prev.map(t => t.id === id ? { ...t, name } : t));
            const updateTableCapacity = (id, cap) => { setTables(prev => prev.map(t => t.id === id ? { ...t, capacity: cap } : t)); setGuests(prev => prev.map(g => (g.tableId === id && g.seatIndex >= cap) ? { ...g, tableId: null, seatIndex: null } : g)); };
            const updateGuestMeal = (id, meal) => { setGuests(prev => prev.map(g => g.id === id ? { ...g, meal } : g)); if (selectedGuest?.id === id) setSelectedGuest(p => ({...p, meal})); };
            const updateGuestName = (id, name) => { setGuests(prev => prev.map(g => g.id === id ? { ...g, name } : g)); if (selectedGuest?.id === id) setSelectedGuest(p => ({...p, name})); };
            const updateGuestStatus = (id, status) => { setGuests(prev => prev.map(g => g.id === id ? { ...g, status, tableId: null, seatIndex: null } : g)); if (status === 'removed' && selectedGuest?.id === id) setSelectedGuest(null); };
            const deleteGuestPermanently = (id) => setGuests(prev => prev.filter(g => g.id !== id));
            const addNewGuest = () => { const ng = { id: `g-man-${Date.now()}`, name: "New Guest", meal: "", originalGroup: "Manual", tableId: null, seatIndex: null, status: 'active' }; setGuests(prev => [...prev, ng]); setSelectedGuest(ng); showNotification("Guest added"); };

            const handleFileUploadWrap = (e) => {
                const file = e.target.files?.[0]; if (!file) return; setCsvFile(file);
                Papa.parse(file, { header: true, skipEmptyLines: true, complete: (res) => {
                    let ng = []; let c = 1;
                    const add = (n, m, grp) => ng.push({ id: `g-${c++}`, name: n.trim(), meal: m||'', originalGroup: grp, tableId: null, seatIndex: null, status: 'active' });
                    if (res.data.length > 0) {
                        if ('Guest Name' in res.data[0]) { res.data.forEach(r => { if (r['Guest Name']?.trim()) add(r['Guest Name'], r['Meal Choice'], 'Individual'); }); } 
                        else if ('Name' in res.data[0] || 'Guests Attending' in res.data[0]) {
                            res.data.forEach(r => {
                                const raw = r['Name'] || ""; const count = parseInt(r['Guests Attending'] || "0", 10); if (!raw || count === 0) return;
                                let names = raw.split(/(?: and | & |, )/i).map(n => n.trim()).filter(n => n);
                                if (names.length === count) names.forEach(n => add(n, '', raw));
                                else if (names.length < count) { names.forEach(n => add(n, '', raw)); for (let i=0; i<count-names.length; i++) add(`Guest of ${names[0]}`, '', raw); } 
                                else { if (count === 1) add(raw, '', raw); else for (let i=0; i<count; i++) add(names[i]||"Guest", '', raw); }
                            });
                        }
                    }
                    setGuests(ng);
                }});
            };

            const handleDragStart = (e, id) => { setDraggedGuestId(id); e.dataTransfer.effectAllowed = "move"; e.stopPropagation(); };
            const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; };
            const handleDropTable = (e, tid) => { e.preventDefault(); e.stopPropagation(); if (draggedGuestId) moveGuest(draggedGuestId, tid, null); setDraggedGuestId(null); };
            const handleDropSeat = (e, tid, idx) => { e.preventDefault(); e.stopPropagation(); if (draggedGuestId) moveGuest(draggedGuestId, tid, idx); setDraggedGuestId(null); };
            const handleDropSidebar = (e) => { e.preventDefault(); if (draggedGuestId) moveGuest(draggedGuestId, null, null); setDraggedGuestId(null); };
            
            const moveGuest = (gid, tid, idx = null) => {
                setGuests(prev => {
                    const g = prev.find(x => x.id === gid); if (!g) return prev;
                    if (!tid) return prev.map(x => x.id === gid ? { ...x, tableId: null, seatIndex: null } : x);
                    const t = tables.find(x => x.id === tid); if (!t) return prev;
                    if (idx !== null) {
                        const occupant = prev.find(x => x.tableId === tid && x.seatIndex === idx && x.id !== gid);
                        if (occupant) return prev.map(x => x.id === gid ? { ...x, tableId: tid, seatIndex: idx } : (x.id === occupant.id ? { ...x, tableId: g.tableId, seatIndex: g.seatIndex } : x));
                        return prev.map(x => x.id === gid ? { ...x, tableId: tid, seatIndex: idx } : x);
                    }
                    const taken = prev.filter(x => x.tableId === tid && x.id !== gid).map(x => x.seatIndex);
                    let nIdx = 0; while (taken.includes(nIdx)) nIdx++;
                    if (nIdx >= t.capacity) { showNotification("Table full!"); return prev; }
                    return prev.map(x => x.id === gid ? { ...x, tableId: tid, seatIndex: nIdx } : x);
                });
            };

            const handleTableMouseDown = (e, id) => {
                if (e.button !== 0) return; e.preventDefault(); e.stopPropagation();
                if (e.target.closest('.guest-seat')) return;
                const isCtrl = e.ctrlKey || e.metaKey;
                let next = new Set(selectedTableIds);
                if (isCtrl) { if (next.has(id)) next.delete(id); else next.add(id); }
                else if (!next.has(id)) next = new Set([id]);
                setSelectedTableIds(next);
                const pos = {}; tables.forEach(t => { if (next.has(t.id) || t.id === id) pos[t.id] = { x: t.x, y: t.y }; });
                setMovingTable({ id, startX: e.clientX, startY: e.clientY, initialPositions: pos });
            };

            const handleResizeStart = (e, id) => { e.preventDefault(); e.stopPropagation(); const t = tables.find(x => x.id === id); if (t) setResizingTable({ id, startX: e.clientX, startY: e.clientY, startW: t.width || 400, startH: t.height || 220, rotation: t.rotation || 0 }); };
            const handleRotateStart = (e, id) => { e.preventDefault(); e.stopPropagation(); const t = tables.find(x => x.id === id); if (!t) return; const cx = t.x + (t.width||400)/2, cy = t.y + (t.height||220)/2; setRotatingTable({ id, cx, cy, startRotation: t.rotation || 0, startAngle: Math.atan2(e.clientY - cy, e.clientX - cx)*180/Math.PI }); };
            
            const handleBgMouseDown = (e) => {
                if (e.button !== 0) return; e.preventDefault();
                if (toolMode === 'pan') { setIsPanning(true); setPanStart({ x: e.clientX - viewTransform.x, y: e.clientY - viewTransform.y }); return; }
                const rect = document.getElementById('floorplan-inner').getBoundingClientRect();
                setSelectionBox({ startX: (e.clientX-rect.left)/viewTransform.scale, startY: (e.clientY-rect.top)/viewTransform.scale, currentX: (e.clientX-rect.left)/viewTransform.scale, currentY: (e.clientY-rect.top)/viewTransform.scale, isDragging: true });
            };

            const handleWheel = (e) => { e.preventDefault(); const zoomSensitivity = 0.001; const delta = -e.deltaY * zoomSensitivity; const newScale = Math.min(Math.max(0.1, viewTransform.scale + delta), 5); setViewTransform(prev => ({ ...prev, scale: newScale })); };
            const handleZoomIn = () => setViewTransform(prev => ({ ...prev, scale: Math.min(prev.scale + 0.1, 5) }));
            const handleZoomOut = () => setViewTransform(prev => ({ ...prev, scale: Math.max(prev.scale - 0.1, 0.1) }));

            useEffect(() => {
                const move = (e) => {
                    if (isPanning) { setViewTransform(v => ({ ...v, x: e.clientX - panStart.x, y: e.clientY - panStart.y })); return; }
                    if (selectionBox?.isDragging) { const r = document.getElementById('floorplan-inner').getBoundingClientRect(); setSelectionBox(v => ({ ...v, currentX: (e.clientX-r.left)/viewTransform.scale, currentY: (e.clientY-r.top)/viewTransform.scale })); return; }
                    if (rotatingTable) { const a = Math.atan2(e.clientY-rotatingTable.cy, e.clientX-rotatingTable.cx)*180/Math.PI; setTables(ts => ts.map(t => t.id === rotatingTable.id ? { ...t, rotation: rotatingTable.startRotation+(a-rotatingTable.startAngle) } : t)); return; }
                    if (resizingTable) { const dx = (e.clientX-resizingTable.startX)/viewTransform.scale, dy = (e.clientY-resizingTable.startY)/viewTransform.scale; const rad = resizingTable.rotation*Math.PI/180, cos = Math.cos(rad), sin = Math.sin(rad); setTables(ts => ts.map(t => t.id === resizingTable.id ? { ...t, width: Math.max(200, resizingTable.startW + (dx*cos + dy*sin)), height: Math.max(100, resizingTable.startH + (dy*cos - dx*sin)) } : t)); return; }
                    if (movingTable) { const dx = (e.clientX-movingTable.startX)/viewTransform.scale, dy = (e.clientY-movingTable.startY)/viewTransform.scale; setTables(ts => ts.map(t => movingTable.initialPositions[t.id] ? { ...t, x: movingTable.initialPositions[t.id].x+dx, y: movingTable.initialPositions[t.id].y+dy } : t)); }
                };
                const up = (e) => {
                    if (isPanning) setIsPanning(false);
                    if (selectionBox?.isDragging) {
                        const minX = Math.min(selectionBox.startX, selectionBox.currentX), maxX = Math.max(selectionBox.startX, selectionBox.currentX);
                        const minY = Math.min(selectionBox.startY, selectionBox.currentY), maxY = Math.max(selectionBox.startY, selectionBox.currentY);
                        if (Math.abs(maxX-minX) < 5 && Math.abs(maxY-minY) < 5) { if (!e.shiftKey) setSelectedTableIds(new Set()); } 
                        else { const next = e.shiftKey ? new Set(selectedTableIds) : new Set(); tables.forEach(t => { const w = t.width || (t.type === 'round' ? roundTableSize : 400), h = t.height || (t.type === 'round' ? roundTableSize : 220); if (minX < t.x+w && maxX > t.x && minY < t.y+h && maxY > t.y) next.add(t.id); }); setSelectedTableIds(next); }
                        setSelectionBox(null);
                    }
                    setMovingTable(null); setResizingTable(null); setRotatingTable(null);
                };
                window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
                return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
            }, [movingTable, resizingTable, rotatingTable, selectionBox, tables, selectedTableIds, roundTableSize, viewTransform, isPanning, panStart]);

            const handleBgDragOver = (e) => { if (e.dataTransfer.types && Array.from(e.dataTransfer.types).includes("Files")) { e.preventDefault(); setIsDragOverBg(true); } };
            const handleBgDragLeave = (e) => { e.preventDefault(); setIsDragOverBg(false); };
            const handleBgDrop = (e) => { e.preventDefault(); setIsDragOverBg(false); if (e.dataTransfer.files && e.dataTransfer.files.length > 0) { const file = e.dataTransfer.files[0]; if (file.type.startsWith('image/')) { setBgFile(file); const reader = new FileReader(); reader.onload = (e) => { const img = new Image(); img.onload = () => { setBgImageDims({ width: img.width, height: img.height }); setBgImage(reader.result); showNotification("Background Updated"); }; img.src = reader.result; }; reader.readAsDataURL(file); } } };

            const seatedCount = guests.filter(g => g.tableId).length;
            const totalCount = guests.filter(g => g.status !== 'removed').length;

            const canvasArea = (
                <div className="flex-1 overflow-hidden relative bg-slate-200 cursor-default" id="floorplan-area"
                    onDragOver={handleBgDragOver} onDragLeave={handleBgDragLeave} onDrop={handleBgDrop} onWheel={handleWheel}
                    style={{ touchAction: 'none' }}
                    onTouchStart={e => {
                        if (e.touches.length === 2) {
                            setIsPanning(false);
                            const dx = e.touches[0].clientX - e.touches[1].clientX;
                            const dy = e.touches[0].clientY - e.touches[1].clientY;
                            pinchRef.current = { dist: Math.hypot(dx, dy), startScale: viewTransform.scale };
                        } else if (e.touches.length === 1) {
                            pinchRef.current = null;
                            setIsPanning(true);
                            setPanStart({ x: e.touches[0].clientX - viewTransform.x, y: e.touches[0].clientY - viewTransform.y });
                        }
                    }}
                    onTouchMove={e => {
                        if (e.touches.length === 2 && pinchRef.current) {
                            const dx = e.touches[0].clientX - e.touches[1].clientX;
                            const dy = e.touches[0].clientY - e.touches[1].clientY;
                            const newDist = Math.hypot(dx, dy);
                            const newScale = Math.min(Math.max(0.1, pinchRef.current.startScale * (newDist / pinchRef.current.dist)), 5);
                            setViewTransform(v => ({ ...v, scale: newScale }));
                        } else if (isPanning && e.touches.length === 1) {
                            setViewTransform(v => ({ ...v, x: e.touches[0].clientX - panStart.x, y: e.touches[0].clientY - panStart.y }));
                        }
                    }}
                    onTouchEnd={e => { if (e.touches.length < 2) pinchRef.current = null; if (e.touches.length === 0) setIsPanning(false); }}>
                    <div id="floorplan-inner" onMouseDown={handleBgMouseDown} className={`relative transition-transform origin-top-left ${toolMode === 'pan' ? (isPanning ? 'cursor-grabbing' : 'cursor-grab') : 'cursor-default'}`} style={{ width: bgImage ? `${bgImageDims.width * bgScale}px` : '3000px', height: bgImage ? `${bgImageDims.height * bgScale}px` : '3000px', transform: `translate(${viewTransform.x}px, ${viewTransform.y}px) scale(${viewTransform.scale})`, backgroundImage: bgImage ? `url(${bgImage})` : 'none', backgroundSize: '100% 100%', backgroundRepeat: 'no-repeat', backgroundColor: isDragOverBg ? '#e2e8f0' : (bgImage ? 'transparent' : '#f1f5f9') }}>
                        {!bgImage && <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 opacity-20"><Icon name="Image" size={96} className="mb-4"/><p className="font-bold text-2xl">Drag floor plan image here</p></div>}
                        {selectionBox && <div className="absolute border-2 border-blue-500 bg-blue-200/30 z-50 pointer-events-none select-box-overlay" style={{ left: Math.min(selectionBox.startX, selectionBox.currentX), top: Math.min(selectionBox.startY, selectionBox.currentY), width: Math.abs(selectionBox.currentX-selectionBox.startX), height: Math.abs(selectionBox.currentY-selectionBox.startY) }} />}
                        {tables.map(table => <TableWrapper key={table.id} table={table} guests={guests} handleDragOver={handleDragOver} handleDropTable={handleDropTable} handleDropSeat={handleDropSeat} handleDragStart={handleDragStart} setSelectedGuest={setSelectedGuest} onTableMouseDown={handleTableMouseDown} isSelected={selectedTableIds.has(table.id)} size={roundTableSize} onResizeStart={handleResizeStart} onRotateStart={handleRotateStart} updateTableCapacity={updateTableCapacity} assigningGuest={assigningGuest} setAssigningGuest={setAssigningGuest} moveGuest={moveGuest} />)}
                        {isDragOverBg && <div className="absolute inset-0 bg-blue-500/10 border-4 border-blue-400 border-dashed z-50 pointer-events-none flex items-center justify-center"><div className="bg-blue-500 text-white px-6 py-3 rounded-full font-bold shadow-lg">Drop Image to Set Background</div></div>}
                    </div>
                </div>
            );

            return (
                <div className="flex h-dvh w-full font-sans text-sm">
                    {isUploading && <ProgressBar progress={uploadProgress} />}
                    <SaveModal isOpen={isSaveModalOpen} onClose={() => setIsSaveModalOpen(false)} onSave={handleSaveLayout} currentName={planName} setCurrentName={setPlanName} availableLayouts={availableLayouts} />
                    <LoadModal isOpen={isLoadModalOpen} onClose={() => setIsLoadModalOpen(false)} onLoad={handleLoadLayout} availableLayouts={availableLayouts} />
                    <TableListModal isOpen={isTableListOpen} onClose={() => { setIsTableListOpen(false); if (isMobile) setMobileTab('canvas'); }} tables={tables} guests={guests} updateTableName={updateTableName} isMobile={isMobile} />
                    <GuestDetails selectedGuest={selectedGuest} setSelectedGuest={setSelectedGuest} tables={tables} updateGuestMeal={updateGuestMeal} updateGuestName={updateGuestName} moveGuest={moveGuest} />
                    <Toast message={notification} onClose={() => setNotification(null)} />

                    {isMobile ? (
                        <div className="flex flex-col h-full w-full">
                            {/* Mobile top bar */}
                            <header className="bg-white border-b border-slate-200 px-4 py-2 flex items-center justify-between shadow-sm shrink-0 z-10">
                                <div>
                                    <div className="font-bold text-slate-800 text-sm leading-tight">{roomName}</div>
                                    <div className="text-[10px] text-slate-400">Seated: {seatedCount}/{totalCount}</div>
                                </div>
                                <div className="flex items-center gap-0.5">
                                    <button onClick={() => setIsSaveModalOpen(true)} className="flex flex-col items-center px-2 py-1 text-blue-600 hover:bg-blue-50 rounded gap-0.5"><Icon name="FloppyDisk" size={16}/><span className="text-[9px] font-bold">Save</span></button>
                                    <button onClick={() => setIsLoadModalOpen(true)} className="flex flex-col items-center px-2 py-1 text-slate-600 hover:bg-slate-100 rounded gap-0.5"><Icon name="CloudDownload" size={16}/><span className="text-[9px] font-bold">Load</span></button>
                                    <button onClick={exportSeatedCSV} className="flex flex-col items-center px-2 py-1 text-green-600 hover:bg-green-50 rounded gap-0.5"><Icon name="FileSpreadsheet" size={16}/><span className="text-[9px] font-bold">CSV</span></button>
                                    <button onClick={handleExportPDF} className="flex flex-col items-center px-2 py-1 text-slate-700 hover:bg-slate-100 rounded gap-0.5"><Icon name="Download" size={16}/><span className="text-[9px] font-bold">PDF</span></button>
                                </div>
                            </header>

                            {/* Tab content */}
                            <div className="flex-1 overflow-hidden flex flex-col">
                                {mobileTab === 'guests' && (
                                    <UnseatedList guests={guests} searchQuery={searchQuery} setSearchQuery={setSearchQuery} handleDragStart={handleDragStart} handleDragOver={handleDragOver} handleDropSidebar={handleDropSidebar} setSelectedGuest={setSelectedGuest} handleFileUpload={handleFileUploadWrap} updateGuestStatus={updateGuestStatus} deleteGuestPermanently={deleteGuestPermanently} addGuest={addNewGuest} assigningGuest={assigningGuest} setAssigningGuest={setAssigningGuest} isMobile={true} />
                                )}
                                {mobileTab === 'canvas' && (
                                    <div className="flex-1 flex flex-col overflow-hidden">
                                        {assigningGuest && (
                                            <div className="bg-blue-600 text-white px-4 py-2 flex items-center justify-between shrink-0">
                                                <span className="text-sm font-medium">Placing: <strong>{assigningGuest.name}</strong> — tap a seat</span>
                                                <button onClick={() => setAssigningGuest(null)} className="text-white/80 hover:text-white text-xs font-bold px-2 py-1 rounded border border-white/30">Cancel</button>
                                            </div>
                                        )}
                                        <div className="flex items-center gap-2 px-3 py-1.5 bg-white border-b border-slate-200 shrink-0 overflow-x-auto">
                                            <div className="flex bg-slate-100 rounded p-0.5 border shrink-0">
                                                <button onClick={() => setToolMode('select')} className={`p-1 rounded ${toolMode === 'select' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`} title="Select"><Icon name="MousePointer" size={14}/></button>
                                                <button onClick={() => setToolMode('pan')} className={`p-1 rounded ${toolMode === 'pan' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`} title="Pan"><Icon name="Hand" size={14}/></button>
                                            </div>
                                            <div className="flex items-center gap-1 bg-slate-100 rounded p-0.5 border shrink-0">
                                                <button onClick={handleZoomOut} className="p-1 hover:bg-white rounded text-slate-500"><Icon name="Minus" size={12}/></button>
                                                <span className="text-[10px] font-mono w-8 text-center">{Math.round(viewTransform.scale * 100)}%</span>
                                                <button onClick={handleZoomIn} className="p-1 hover:bg-white rounded text-slate-500"><Icon name="Plus" size={12}/></button>
                                            </div>
                                            <button onClick={() => addTable('round')} className="shrink-0 text-xs text-slate-600 px-2 py-1 rounded border"><Icon name="PlusCircle" size={12} className="inline mr-1"/>Round</button>
                                            <button onClick={() => addTable('rect')} className="shrink-0 text-xs text-slate-600 px-2 py-1 rounded border"><Icon name="PlusCircle" size={12} className="inline mr-1"/>Rect</button>
                                            {selectedTableIds.size > 0 && <button onClick={removeSelectedTables} className="shrink-0 text-xs text-red-600 px-2 py-1 rounded border border-red-200"><Icon name="Trash2" size={12} className="inline mr-1"/>Del</button>}
                                        </div>
                                        {canvasArea}
                                    </div>
                                )}
                            </div>

                            {/* Bottom tab bar */}
                            <nav className="bg-white border-t border-slate-200 flex shrink-0 z-10 pb-safe">
                                <button onClick={() => setMobileTab('guests')} className={`flex-1 py-3 flex flex-col items-center gap-0.5 text-[10px] font-bold transition-colors ${mobileTab === 'guests' ? 'text-blue-600' : 'text-slate-500'}`}>
                                    <Icon name="Users" size={20}/> Guests
                                </button>
                                <button onClick={() => setMobileTab('canvas')} className={`flex-1 py-3 flex flex-col items-center gap-0.5 text-[10px] font-bold transition-colors ${mobileTab === 'canvas' ? 'text-blue-600' : 'text-slate-500'}`}>
                                    <Icon name="MousePointer" size={20}/> Canvas
                                    {assigningGuest && <span className="w-2 h-2 rounded-full bg-blue-500 absolute mt-0.5 ml-4"></span>}
                                </button>
                                <button onClick={() => { setMobileTab('list'); setIsTableListOpen(true); }} className={`flex-1 py-3 flex flex-col items-center gap-0.5 text-[10px] font-bold transition-colors ${mobileTab === 'list' ? 'text-blue-600' : 'text-slate-500'}`}>
                                    <Icon name="List" size={20}/> Outline
                                </button>
                            </nav>
                        </div>
                    ) : (
                        <>
                            <UnseatedList guests={guests} searchQuery={searchQuery} setSearchQuery={setSearchQuery} handleDragStart={handleDragStart} handleDragOver={handleDragOver} handleDropSidebar={handleDropSidebar} setSelectedGuest={setSelectedGuest} handleFileUpload={handleFileUploadWrap} updateGuestStatus={updateGuestStatus} deleteGuestPermanently={deleteGuestPermanently} addGuest={addNewGuest} assigningGuest={assigningGuest} setAssigningGuest={setAssigningGuest} isMobile={false} />
                            <div className="flex-1 flex flex-col bg-slate-100 min-w-0">
                                <header className="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-4 shadow-sm z-10 shrink-0 overflow-x-auto">
                                    <div className="shrink-0">
                                        <div className="flex items-center gap-2">
                                            {isEditingName ? <input className="text-lg font-bold border-b border-blue-500 focus:outline-none" value={roomName} onChange={e => setRoomName(e.target.value)} onBlur={() => setIsEditingName(false)} autoFocus /> :
                                            <h1 className="text-lg font-bold cursor-pointer hover:text-blue-600 flex items-center gap-2" onClick={() => setIsEditingName(true)}>{roomName}<Icon name="Pencil" size={14} className="opacity-30" /></h1>}
                                        </div>
                                        <div className="text-[10px] text-slate-400">Seated: {seatedCount}/{totalCount}</div>
                                    </div>
                                    <div className="flex bg-slate-100 rounded-lg p-1 border shrink-0">
                                        <button onClick={() => setToolMode('select')} className={`p-1.5 rounded-md ${toolMode === 'select' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`} title="Select"><Icon name="MousePointer" size={16}/></button>
                                        <button onClick={() => setToolMode('pan')} className={`p-1.5 rounded-md ${toolMode === 'pan' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`} title="Pan"><Icon name="Hand" size={16}/></button>
                                    </div>
                                    <div className="flex items-center gap-1 bg-slate-100 rounded-lg p-1 border shrink-0">
                                        <button onClick={handleZoomOut} className="p-1 hover:bg-white rounded text-slate-500"><Icon name="Minus" size={14}/></button>
                                        <span className="text-[10px] font-mono w-10 text-center select-none">{Math.round(viewTransform.scale * 100)}%</span>
                                        <button onClick={handleZoomIn} className="p-1 hover:bg-white rounded text-slate-500"><Icon name="Plus" size={14}/></button>
                                    </div>
                                    <div className="flex items-center gap-2 border-l pl-4 border-slate-200 shrink-0">
                                        <button onClick={() => addTable('round')} className="flex items-center gap-1 text-xs text-slate-600 hover:text-blue-600 px-2 py-1 rounded hover:bg-slate-50 border"><Icon name="PlusCircle" size={14}/> Round</button>
                                        <button onClick={() => addTable('rect')} className="flex items-center gap-1 text-xs text-slate-600 hover:text-blue-600 px-2 py-1 rounded hover:bg-slate-50 border"><Icon name="PlusCircle" size={14}/> Rect</button>
                                        {selectedTableIds.size > 0 && <button onClick={removeSelectedTables} className="flex items-center gap-1 text-xs text-red-600 hover:bg-red-50 px-2 py-1 rounded border border-red-200"><Icon name="Trash2" size={14}/> Delete</button>}
                                    </div>
                                    <div className="flex items-center gap-4 shrink-0">
                                        <div className="flex flex-col gap-1 text-[9px] uppercase font-bold text-slate-400"><span>Table Size</span><input type="range" min="180" max="350" value={roundTableSize} onChange={e => setRoundTableSize(parseInt(e.target.value))} className="w-20 cursor-pointer"/></div>
                                        <div className="flex flex-col gap-1 text-[9px] uppercase font-bold text-slate-400"><span>FP Scale</span><input type="range" min="0.5" max="3" step="0.1" value={bgScale} onChange={e => setBgScale(parseFloat(e.target.value))} className="w-20 cursor-pointer"/></div>
                                    </div>
                                    <div className="flex items-center gap-2 border-l pl-4 border-slate-200 shrink-0">
                                        <button onClick={() => setIsSaveModalOpen(true)} className="flex items-center gap-1.5 px-3 py-2 text-xs text-blue-600 border border-blue-600 hover:bg-blue-50 rounded font-bold transition-colors shadow-sm"><Icon name="FloppyDisk" size={14}/> Save</button>
                                        <button onClick={() => setIsLoadModalOpen(true)} className="flex items-center gap-1.5 px-3 py-2 text-xs text-slate-600 border border-slate-300 hover:bg-slate-50 rounded font-bold transition-colors shadow-sm"><Icon name="CloudDownload" size={14}/> Load</button>
                                        <button onClick={() => setIsTableListOpen(true)} className="flex items-center gap-1.5 px-3 py-2 text-xs text-slate-600 border border-slate-300 hover:bg-slate-50 rounded font-bold transition-colors shadow-sm"><Icon name="List" size={14}/> List View</button>
                                        <button onClick={exportSeatedCSV} className="flex items-center gap-1.5 px-3 py-2 text-xs text-green-700 border border-green-300 hover:bg-green-50 rounded font-bold transition-colors shadow-sm" title="Export Seated CSV"><Icon name="FileSpreadsheet" size={14}/> CSV</button>
                                        <button onClick={handleReset} className="p-2 text-red-400 hover:text-red-600 transition-colors" title="Unseat all guests"><Icon name="RefreshCw" size={16}/></button>
                                        <button onClick={handleExportPDF} className="flex items-center gap-1.5 px-4 py-2 text-xs bg-slate-800 text-white hover:bg-slate-700 rounded font-bold shadow-sm transition-colors"><Icon name="Download" size={14}/> Export PDF</button>
                                    </div>
                                </header>
                                {canvasArea}
                            </div>
                        </>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
